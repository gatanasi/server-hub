###################################################################################################
# Recyclarr Configuration Template: WEB-2160p (V4) & WEB-1080p (V4)                               #
# Updated: 2025-09-07                                                                             #
# Documentation: https://recyclarr.dev                                                            #
###################################################################################################

# Instance Definition: https://recyclarr.dev/reference/configuration/basic/
sonarr:
  tv-hq:
    base_url: !env_var SONARR_URL
    api_key: !env_var SONARR_API_KEY
    delete_old_custom_formats: true
    replace_existing_custom_formats: true

    include:
      # Comment out any of the following includes to disable them
      - template: sonarr-quality-definition-series
      - template: sonarr-v4-quality-profile-web-2160p
      - template: sonarr-v4-custom-formats-web-2160p
      - template: sonarr-v4-quality-profile-web-1080p
      - template: sonarr-v4-custom-formats-web-1080p

    quality_profiles:
      - name: WEB-2160p
        min_format_score: 0
        # Forces Sonarr to prefer the language of origin (e.g., English for US shows, Japanese for Anime)
        language: Original
        # Explicitly list qualities to allow fallbacks while keeping upgrade preference
        qualities:
          - name: WEB 2160p
          - name: WEB 1080p
      - name: WEB-1080p
        min_format_score: 0
        language: Original
        qualities:
          - name: WEB 1080p
          - name: WEB 720p

    custom_formats:
      - trash_ids:
          - e23eff36d992d1720120188d3f18544d # Dolby Vision
        assign_scores_to:
          - name: WEB-2160p
            score: 500 # Significant boost to prefer DV over HDR10

      - trash_ids:
          - 32b367365729d530ca1c124a0b180c64 # Bad Dual Groups
          - 82d40da2bc6923f41e14394075dd4b03 # No-RlsGroup
          - e1a997ddb54e3ecbfe06341ad323c458 # Obfuscated
          - 06d66ab109d4d2eddb2794d21526d140 # Retags
          - 1b3994c551cbb92a2c781af061f4ab44 # Scene
        assign_scores_to:
          - name: WEB-2160p
          - name: WEB-1080p
      - trash_ids:
          # Uncomment the next six lines to allow x265 HD releases with HDR/DV
          - 47435ece6b99a0b477caf360e79ba0bb # x265 (HD)
        assign_scores_to:
          - name: WEB-2160p
            score: 0
          - name: WEB-1080p
            score: 0
      - trash_ids:
          - 9b64dff695c2115facf1b6ea59c9bd07 # x265 (no HDR/DV)
        assign_scores_to:
          - name: WEB-2160p
            score: 0 # ALLOWS 4K SDR (x265 without HDR)
          - name: WEB-1080p
            score: 0

###################################################################################################
# Recyclarr Configuration Template: UHD Bluray + WEB & HD Bluray + WEB                            #
# Updated: 2025-09-07                                                                             #
# Documentation: https://recyclarr.dev                                                            #
###################################################################################################

# Instance Definition: https://recyclarr.dev/reference/configuration/basic/
radarr:
  movies-hq:
    base_url: !env_var RADARR_URL
    api_key: !env_var RADARR_API_KEY
    delete_old_custom_formats: true
    replace_existing_custom_formats: true
    
    include:
      # Comment out any of the following includes to disable them
      - template: radarr-quality-definition-movie
      - template: radarr-quality-profile-uhd-bluray-web
      - template: radarr-custom-formats-uhd-bluray-web
      - template: radarr-quality-profile-hd-bluray-web
      - template: radarr-custom-formats-hd-bluray-web

# Custom Formats: https://recyclarr.dev/reference/configuration/custom-formats/
    quality_profiles:
      - name: UHD Bluray + WEB
        min_format_score: 0
        # In Radarr, this ensures the release matches the movie's original language
        language: Original
      - name: HD Bluray + WEB
        min_format_score: 0
        language: Original

    custom_formats:
      - trash_ids:
          - e23eff36d992d1720120188d3f18544d # Dolby Vision
        assign_scores_to:
          - name: UHD Bluray + WEB
            score: 500 # Ensures DV releases beat standard HDR10

      # Audio
      - trash_ids:
          # Uncomment the next section to enable Advanced Audio Formats
          - 496f355514737f7d83bf7aa4d24f8169 # TrueHD Atmos
          - 2f22d89048b01681dde8afe203bf2e95 # DTS X
          - 417804f7f2c4308c1f4c5d380d4c4475 # ATMOS (undefined)
          - 1af239278386be2919e1bcee0bde047e # DD+ ATMOS
          - 3cafb66171b47f226146a0770576870f # TrueHD
          - dcf3ec6938fa32445f590a4da84256cd # DTS-HD MA
          - a570d4a0e56a2874b64e5bfa55202a1b # FLAC
          - e7c2fcae07cbada050a0af3357491d7b # PCM
          - 8e109e50e0a0b83a5098b056e13bf6db # DTS-HD HRA
          - 185f1dd7264c4562b9022d963ac37424 # DD+
          - f9f847ac70a0af62ea4a08280b859636 # DTS-ES
          - 1c1a4c5e823891c75bc50380a6866f73 # DTS
          - 240770601cc226190c367ef59aba7463 # AAC
          - c2998bd0d90ed5621d8df281e839436e # DD
        assign_scores_to:
          - name: UHD Bluray + WEB

      # Optional
      - trash_ids:
          - b6832f586342ef70d9c128d40c07b872 # Bad Dual Groups
          - cc444569854e9de0b084ab2b8b1532b2 # Black and White Editions
          - ae9b7c9ebde1f3bd336a8cbd1ec4c5e5 # No-RlsGroup
          - 7357cf5161efbf8c4d5d0c30b4815ee2 # Obfuscated
          - 5c44f52a8714fdd79bb4d98e2673be1f # Retags
          - f537cf427b64c38c8e36298f657e4828 # Scene
        assign_scores_to:
          - name: UHD Bluray + WEB
          - name: HD Bluray + WEB

      # Language Enforcement
      - trash_ids:
          - d6e9318c875905d6cfb5bee961afcea9 # Language: Not Original
        assign_scores_to:
          - name: UHD Bluray + WEB
            score: -10000
          - name: HD Bluray + WEB
            score: -10000

      - trash_ids:
          - dc98083864ea246d05a42df0d05f81cc # x265 (HD)
        assign_scores_to:
          - name: UHD Bluray + WEB
            score: 0
          - name: HD Bluray + WEB
            score: 0
      - trash_ids:
          - 839bea857ed2c0a8e084f3cbdbd65ecb # x265 (no HDR/DV)
        assign_scores_to:
          - name: UHD Bluray + WEB
          - name: HD Bluray + WEB
