services:
  # --- Network & VPN Gateway ---
  gluetun:
    image: ghcr.io/qdm12/gluetun:v3.41.0
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - 8080:8080 # qBittorrent WebUI
    environment:
      - VPN_SERVICE_PROVIDER=${VPN_SERVICE_PROVIDER}
      - VPN_TYPE=${VPN_TYPE}
      - WIREGUARD_ENDPOINT_IP=${WIREGUARD_ENDPOINT_IP}
      - WIREGUARD_ENDPOINT_PORT=${WIREGUARD_ENDPOINT_PORT}
      - WIREGUARD_PUBLIC_KEY=${WIREGUARD_PUBLIC_KEY}
      - WIREGUARD_PRIVATE_KEY=${WIREGUARD_PRIVATE_KEY}
      - WIREGUARD_PRESHARED_KEY=${WIREGUARD_PRESHARED_KEY}
      - WIREGUARD_ADDRESSES=${WIREGUARD_ADDRESSES}
    volumes:
      - ./config/gluetun:/gluetun
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://www.google.com || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
    restart: always
    networks:
      - arr-net

  # --- Download Client ---
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:5.1.4
    container_name: qbittorrent
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ./config/qbittorrent:/config
      - ${HOST_DIR}:/data
    network_mode: "service:gluetun"
    restart: unless-stopped
    healthcheck:
      test: curl --head --fail http://localhost:8080/ || exit 1
      interval: 30s
      timeout: 10s
      retries: 3

  # --- Extraction Manager ---
  unpackerr:
    image: golift/unpackerr
    container_name: unpackerr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - UN_SONARR_0_URL=http://sonarr:8989
      - UN_SONARR_0_API_KEY=API_KEY_PLACEHOLDER # <--- Update after 1st run
      - UN_RADARR_0_URL=http://radarr:7878
      - UN_RADARR_0_API_KEY=API_KEY_PLACEHOLDER # <--- Update after 1st run
    volumes:
      - ./config/unpackerr:/config
      - ${HOST_DIR}:/data
    restart: unless-stopped
    networks:
      - arr-net

  # --- The "Managers" ---
  radarr:
    image: lscr.io/linuxserver/radarr:6.0.4
    container_name: radarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ./config/radarr:/config
      - ${HOST_DIR}:/data
    ports:
      - 7878:7878
    restart: unless-stopped
    networks:
      - arr-net

  sonarr:
    image: lscr.io/linuxserver/sonarr:4.0.16
    container_name: sonarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ./config/sonarr:/config
      - ${HOST_DIR}:/data
    ports:
      - 8989:8989
    restart: unless-stopped
    networks:
      - arr-net

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:2.3.0
    container_name: prowlarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ./config/prowlarr:/config
    ports:
      - 9696:9696
    restart: unless-stopped
    networks:
      - arr-net

  bazarr:
    image: lscr.io/linuxserver/bazarr:1.5.4
    container_name: bazarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ./config/bazarr:/config
      - ${HOST_DIR}:/data
    ports:
      - 6767:6767
    restart: unless-stopped
    networks:
      - arr-net

  # --- Quality Profile Sync ---
  recyclarr:
    image: ghcr.io/recyclarr/recyclarr:2.1.2
    container_name: recyclarr
    user: ${PUID}:${PGID}
    volumes:
      - ./config/recyclarr:/config
    environment:
      - TZ=${TZ}
    networks:
      - arr-net
    restart: unless-stopped

  # --- Requests ---
  jellyseerr:
    image: ghcr.io/fallenbagel/jellyseerr:2.7.3
    container_name: jellyseerr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ./config/jellyseerr:/app/config
    ports:
      - 5055:5055
    restart: unless-stopped
    networks:
      - arr-net

networks:
  arr-net:
    driver: bridge
    attachable: true
