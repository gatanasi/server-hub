services:
  db:
    container_name: car-price-tracker-db
    image: postgres:18-alpine@sha256:96d56f7f57c6aacd1fcb908bc83b345ec5f83231ee486dd66a1baadce274db88
    restart: unless-stopped
    environment:
      TZ: ${TIMEZONE}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - database-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  car-price-tracker:
    container_name: car-price-tracker
    image: ghcr.io/gatanasi/car-price-tracker:v1.14.0@sha256:f13e99e71b0e72289c6e58bcb2f8b14b6585a11f90046dc15e831dfa0c5ffa7f
    restart: unless-stopped
    environment:
      TZ: ${TIMEZONE}
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?sslmode=disable
      PORT: "8080"
      BASE_URL: ${BASE_URL}
      SCRAPE_INTERVAL_HOURS: ${SCRAPE_INTERVAL_HOURS}
      RETRY_INTERVAL_HOURS: ${RETRY_INTERVAL_HOURS}
      MAX_PAGES_PER_FILTER: ${MAX_PAGES_PER_FILTER}
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - default
      - database-internal
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  adminer:
    container_name: car-price-tracker-adminer
    image: adminer:5.4.2@sha256:832668141a338ba93dd7bbf5ee4f5f351d98088b959719cf82b2bca785c7e08c
    restart: unless-stopped
    environment:
      ADMINER_DEFAULT_SERVER: car-price-tracker-db
    ports:
      - "8081:8080"
    networks:
      - default
      - database-internal
    depends_on:
      - db

networks:
  database-internal:
    internal: true

volumes:
  pgdata:
    name: car-price-tracker_pgdata
