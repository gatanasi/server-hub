services:
  db:
    container_name: car-price-tracker-db
    image: postgres:18-alpine@sha256:54451ecb8ab38c24c3ec123f2fd501303a3a1856a5c66e98cecf2460d5e1e9d7
    restart: unless-stopped
    environment:
      TZ: ${TIMEZONE}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - database-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  car-price-tracker:
    container_name: car-price-tracker
    image: ghcr.io/gatanasi/car-price-tracker:v1.7.1@sha256:4e957aed4a32d15232ad2c9deed20cc0bd97799f10e95927cbe3d84cbde380c7
    restart: unless-stopped
    environment:
      TZ: ${TIMEZONE}
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?sslmode=disable
      PORT: "8080"
      BASE_URL: ${BASE_URL}
      SCRAPE_INTERVAL_HOURS: ${SCRAPE_INTERVAL_HOURS}
      RETRY_INTERVAL_HOURS: ${RETRY_INTERVAL_HOURS}
      MAX_PAGES_PER_FILTER: ${MAX_PAGES_PER_FILTER}
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - default
      - database-internal
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  adminer:
    container_name: car-price-tracker-adminer
    image: adminer:5.4.2@sha256:cc64d253db4f016cbcff2ff2f01e60ed07e74f38b4398f84d3c4fae4b5ce0e07
    restart: unless-stopped
    environment:
      ADMINER_DEFAULT_SERVER: car-price-tracker-db
    ports:
      - "8081:8080"
    networks:
      - default
      - database-internal
    depends_on:
      - db

networks:
  database-internal:
    internal: true

volumes:
  pgdata:
    name: car-price-tracker_pgdata
