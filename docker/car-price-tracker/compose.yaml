services:
  db:
    container_name: car-price-tracker-db
    image: postgres:18-alpine@sha256:1b1689b20d16a014a3d195653381cf2caa75a41a92d93b255a9d6ea29fd353aa
    restart: unless-stopped
    environment:
      TZ: ${TIMEZONE}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - database-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  browserless:
    container_name: car-price-tracker-browserless
    image: ghcr.io/browserless/chromium:v2.54.1@sha256:5a0b8ffa43426549e9df7c822c68505e70f3817192ed111f81bd587a2a9e7229
    restart: unless-stopped
    environment:
      TZ: ${TIMEZONE}
      TOKEN: ${BROWSERLESS_TOKEN}
      HOST: 0.0.0.0
      TIMEOUT: ${BROWSERLESS_TIMEOUT_MS}
      CONCURRENT: ${BROWSERLESS_CONCURRENT}
      DEBUG: "browserless*,-**:trace,-**:debug"
    shm_size: "2g"
    networks:
      - default
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS \"http://localhost:3000/pressure?token=$$TOKEN\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G

  car-price-tracker:
    container_name: car-price-tracker
    image: ghcr.io/gatanasi/car-price-tracker:v2.1.0@sha256:602f3a89072d658fa92b3a5b73881d8cf11a61f3847f0711f184b39ccf5262c6
    restart: unless-stopped
    environment:
      TZ: ${TIMEZONE}
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?sslmode=disable
      PORT: "8080"
      BASE_URL: ${BASE_URL}
      SCRAPE_INTERVAL_HOURS: ${SCRAPE_INTERVAL_HOURS}
      RETRY_INTERVAL_HOURS: ${RETRY_INTERVAL_HOURS}
      MAX_PAGES_PER_FILTER: ${MAX_PAGES_PER_FILTER}
      CDP_ENDPOINT: ws://browserless:3000/chromium?token=${BROWSERLESS_TOKEN}
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      browserless:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - default
      - database-internal
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  adminer:
    container_name: car-price-tracker-adminer
    image: adminer:5.4.2@sha256:4dae499420bb9ba8c5d73745e5c8e02b696acd214b66b5f2946eceee7f171fee
    restart: unless-stopped
    environment:
      ADMINER_DEFAULT_SERVER: car-price-tracker-db
    ports:
      - "8081:8080"
    networks:
      - default
      - database-internal
    depends_on:
      - db
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

networks:
  database-internal:
    internal: true

volumes:
  pgdata:
    name: car-price-tracker_pgdata
