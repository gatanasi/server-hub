services:
  odoo:
    image: odoo:19.0@sha256:18f4ead7d36dbe259ceca67dda6aafec4456509b2dccf39f86a85b1d44e4691b
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8069"
    volumes:
      - odoo_data:/var/lib/odoo
      - ./config:/etc/odoo
      - ./addons:/mnt/extra-addons
    environment:
      - HOST=db
      - PGDATABASE=${POSTGRES_DB}
      - PGUSER=${POSTGRES_USER}
      - PGPASSWORD=${POSTGRES_PASSWORD}
    command: --init base --db-filter=.* # Default username: admin, password: admin
    restart: unless-stopped
    networks:
      - odoo_net

  db:
    image: postgres:16@sha256:cf2a05fe40887b721e4b3dbac8fd32673c08292dcc8ba6b62b52b7f640433bd0
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - odoo_net

volumes:
  odoo_data:
  db_data:

networks:
  odoo_net:
