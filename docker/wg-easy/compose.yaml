volumes:
  etc_wireguard:

services:
  wg-easy:
    container_name: wg-easy
    environment:
      - WG_PORT=${WG_PORT}
      - DISABLE_IPV6=true

    image: ghcr.io/wg-easy/wg-easy:15.3.0@sha256:93bbd593e07bab98d02807a28770ac87ab6c48818e319e68c1f66561feb99876
    volumes:
      - etc_wireguard:/etc/wireguard
    ports:
      - "${WG_PORT}:${WG_PORT}/udp"
      - "51821:51821/tcp"
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:51821/"]
      interval: 20s
      timeout: 10s
      retries: 3
      start_period: 10s
