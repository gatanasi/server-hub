volumes:
  etc_wireguard:

services:
  wg-easy:
    container_name: wg-easy
    environment:
      - WG_PORT=${WG_PORT}
      - DISABLE_IPV6=true

    image: ghcr.io/wg-easy/wg-easy:15@sha256:bb8152762c36f824eb42bb2f3c5ab8ad952818fbef677d584bc69ec513b251b0
    volumes:
      - etc_wireguard:/etc/wireguard
    ports:
      - "${WG_PORT}:${WG_PORT}/udp"
      - "51821:51821/tcp"
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:51821/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
