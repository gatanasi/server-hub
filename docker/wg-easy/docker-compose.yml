volumes:
  etc_wireguard:

services:
  wg-easy:
    container_name: wg-easy
    environment:
      - WG_PORT=${WG_PORT}
      - DISABLE_IPV6=true

    image: ghcr.io/wg-easy/wg-easy:15.2.1@sha256:4ffc03c35dce5456bbb2fa6b136a1eeb196394548dee0650ae692efdd1062e01
    volumes:
      - etc_wireguard:/etc/wireguard
    ports:
      - "${WG_PORT}:${WG_PORT}/udp"
      - "51821:51821/tcp"
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:51821/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
