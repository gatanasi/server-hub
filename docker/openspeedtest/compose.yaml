services:
    openspeedtest:
        container_name: openspeedtest
        image: openspeedtest/latest:v2.0.6@sha256:a6a7e3b3e9e93cfe7b9b2eb49c60b2a93644149a0a600845d4df57148b193ff6
        restart: unless-stopped
        ports:
            - "80:3000"
            - "443:3001"
            - "443:3001/udp"
        volumes:
            - ${HOST_CERT_PATH}:/etc/ssl:ro
        depends_on:
            - certbot
        healthcheck:
            test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 40s

    certbot:
        container_name: certbot
        image: certbot/dns-cloudflare:5.5.0@sha256:f90db06a98b61bd221fe5a9688d0bb975b444760ef677cb4369ffc2a8a16e579
        restart: unless-stopped
        volumes:
            - ${HOST_CERTBOT_DATA}:/etc/letsencrypt
            - ${HOST_CERT_PATH}:/output_ssl
            # Mount docker socket to restart openspeedtest on renewal
            - /var/run/docker.sock:/var/run/docker.sock
        entrypoint: /bin/sh
        command: >-
            -c '
                set -eu

                # Create Cloudflare credentials file
                mkdir -p /secrets
                printf "dns_cloudflare_api_token = %s\n" "${CLOUDFLARE_API_TOKEN}" > /secrets/cloudflare.ini
                chmod 600 /secrets/cloudflare.ini

                echo "Attempting to obtain initial certificate for ${CERTBOT_DOMAIN}..."

                # Install docker-cli (for the deploy-hook)
                if ! command -v docker &> /dev/null; then
                    echo "Installing docker-cli..."
                    apk add --no-cache docker-cli
                fi;

                # Get certificate
                if [ ! -f "/etc/letsencrypt/live/${CERTBOT_DOMAIN}/fullchain.pem" ]; then
                    echo "No certificate found. Obtaining initial certificate for ${CERTBOT_DOMAIN}..."
                    certbot certonly \
                        --non-interactive \
                        --agree-tos \
                        --dns-cloudflare \
                        --email ${CERTBOT_EMAIL} \
                        --dns-cloudflare-credentials /secrets/cloudflare.ini \
                        --dns-cloudflare-propagation-seconds 60 \
                        -d ${CERTBOT_DOMAIN}

                    echo "Copying certificates to output directory for openspeedtest..."
                    cp /etc/letsencrypt/live/${CERTBOT_DOMAIN}/fullchain.pem /output_ssl/nginx.crt
                    cp /etc/letsencrypt/live/${CERTBOT_DOMAIN}/privkey.pem /output_ssl/nginx.key

                    chmod 644 /output_ssl/nginx.crt /output_ssl/nginx.key

                    docker restart openspeedtest
                else
                    echo "Certificate found. Skipping initial-obtainment"
                fi

                # Start renewal loop
                while :; do
                    echo "Starting renewal loop..."
                    certbot renew --quiet \
                        --deploy-hook "cp /etc/letsencrypt/live/${CERTBOT_DOMAIN}/fullchain.pem /output_ssl/nginx.crt && \
                                       cp /etc/letsencrypt/live/${CERTBOT_DOMAIN}/privkey.pem /output_ssl/nginx.key && \
                                       docker restart openspeedtest";
                    sleep 12h;
                done;
            '
