services:
  mediamanager:
    container_name: mediamanager
    image: ghcr.io/maxdorninger/mediamanager/mediamanager:1.12.3@sha256:83b80dce26f8cdbbf8afec06784a85e7eedcba05ad4be57d2f70b006304d7a8c
    ports:
      - "8080:8000"
    env_file:
      - .env
    volumes:
      # Mount your actual media directories here - these paths should match your config.toml
      - /mnt/data/test/:/data/
      # Config folder for application configuration
      - ./config/:/app/config/
      # Image folder
      - ./images/:/data/images/
    depends_on:
      db:
        condition: service_healthy
  db:
    container_name: mediamanager_postgres
    image: postgres:17.10@sha256:0027bef26712baaee437a4ea48fdf3d2d2e2bc5f0d81615374408ca320f3c7e3
    restart: unless-stopped
    volumes:
      - ./postgres:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
