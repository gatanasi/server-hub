services:
  mediamanager:
    container_name: mediamanager
    image: ghcr.io/maxdorninger/mediamanager/mediamanager:1.12.1@sha256:45b1e7c05135980135a4273a0a1143c85d67d295711e187d3c8240c3c9eb0d65
    ports:
      - "8080:8000"
    env_file:
      - .env
    volumes:
      # Mount your actual media directories here - these paths should match your config.toml
      - /mnt/data/test/:/data/
      # Config folder for application configuration
      - ./config/:/app/config/
      # Image folder
      - ./images/:/data/images/
    depends_on:
      db:
        condition: service_healthy
  db:
    container_name: mediamanager_postgres
    image: postgres:17.7@sha256:4493696c5ba6a9cd4a3303411d5dd6af52cf5e34cdd87ba8ebf26a19735f84d1
    restart: unless-stopped
    volumes:
      - ./postgres:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
