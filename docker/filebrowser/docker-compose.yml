services:
  filebrowser:
    image: filebrowser/filebrowser:v2.61.1@sha256:751252db58b56a23179f8ab19a4c4188792e86806e63737aa25999ef5d2b0c01
    container_name: filebrowser
    user: 1000:1000
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - 'filebrowser_config:/config'
      - 'filebrowser_database:/database'
      - 'filebrowser_data:/srv'

volumes:
  filebrowser_config:
  filebrowser_database:
  filebrowser_data:
