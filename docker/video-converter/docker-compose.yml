services:
  video-converter:
    container_name: video-converter
    image: ghcr.io/gatanasi/video-converter:2.1.2@sha256:bd8d52d7c70521b51d571488cd373b7ac0b51c43e47f6cc763fdfde4d2a2470d
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-3000}:3000"
    environment:
      GOOGLE_DRIVE_API_KEY: ${GOOGLE_DRIVE_API_KEY}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      WORKER_COUNT: ${WORKER_COUNT}
      DEFAULT_DRIVE_FOLDER_ID: "${DEFAULT_DRIVE_FOLDER_ID:-}"
    init: true
    volumes:
      - ./uploads:/app/uploads
      - ./converted:/app/converted
    cap_add:
      - SYS_NICE
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/config"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s