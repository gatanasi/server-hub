# Ansible Inventory for Docker Compose Applications
#
# This inventory maps application names to their target hosts.
# Each host should have the docker user in the 'docker' group.
#
# To add a new application:
# 1. Add the host under [docker_hosts] with its app-to-host mapping
# 2. Ensure the target user is in the docker group on the target VM
# 3. Ensure SSH key from deployer.vm can reach the target
#
---
all:
  vars:
    # Default app directory on target hosts
    app_base_dir: /opt/apps

    # Docker compose command (v2)
    docker_compose_cmd: docker compose

    # Whether to prune old images after deployment
    docker_prune_after_deploy: true

    # ===========================================
    # Backup/Restore Configuration
    # ===========================================

    # Backup destination (should be an NFS/SMB mount)
    backup_destination: /mnt/backups

    # Backup source for restore operations (typically same as destination)
    backup_source: /mnt/backups

    # How many backups to keep per volume (oldest are deleted)
    backup_keep_count: 3

    # Helper image for backup/restore operations (pinned for reproducibility)
    helper_image: alpine:3.23.2

    # Timeout for stopping containers during backup/restore (seconds)
    stop_timeout: 60

    # ===========================================
    # Health Check Configuration
    # ===========================================

    # Default timeout for Docker Compose wait (seconds)
    docker_compose_wait_timeout: 90

  children:
    # Group for all Docker Compose hosts
    docker_hosts:
      hosts:
        n8n.vm:
          ansible_user: n8n
          ansible_host: n8n.vm
          managed_apps:
            - n8n

        openspeedtest.vm:
          ansible_user: speed
          ansible_host: openspeedtest.vm
          managed_apps:
            - openspeedtest

        video-converter.vm:
          ansible_user: converter
          ansible_host: video-converter.vm
          managed_apps:
            - video-converter

        stirling-pdf.vm:
          ansible_user: stirling
          ansible_host: stirling-pdf.vm
          managed_apps:
            - stirling-pdf

        odoo.vm:
          ansible_user: odoo
          ansible_host: odoo.vm
          managed_apps:
            - odoo

        convertx.vm:
          ansible_user: convertx
          ansible_host: convertx.vm
          managed_apps:
            - convertx

        caddy.vm:
          ansible_user: caddy
          ansible_host: caddy.vm
          managed_apps:
            - caddy

        wireguard.vm:
          ansible_user: wireguard
          ansible_host: wireguard.vm
          managed_apps:
            - wg-easy

        immich.vm:
          ansible_user: immich
          ansible_host: immich.vm
          managed_apps:
            - immich

        jellyfin.vm:
          ansible_user: jellyfin
          ansible_host: jellyfin.vm
          managed_apps:
            - jellyfin

        arr.vm:
          ansible_user: arr
          ansible_host: arr.vm
          managed_apps:
            - arr
        # Add more hosts as needed:
        # multi-app.vm:
        #   ansible_user: apps
        #   ansible_host: multi-app.vm
        #   managed_apps:
        #     - convertx
        #     - video-converter
        #     - openspeedtest

# Host pattern for app-to-host mapping
# This allows us to find which host runs which app
