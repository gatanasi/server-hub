---
# restore-docker-volumes.yml - Restore Docker volumes from backup
#
# This playbook restores Docker volumes from a previous backup.
# It stops the application, restores volumes, and restarts services.
#
# Usage:
#   # List available backups for an app
#   ansible-playbook playbooks/restore-docker-volumes.yml -e "app_name=n8n list_only=true"
#
#   # Restore latest backup
#   ansible-playbook playbooks/restore-docker-volumes.yml -e "app_name=n8n"
#
#   # Restore specific backup by timestamp
#   ansible-playbook playbooks/restore-docker-volumes.yml -e "app_name=n8n backup_timestamp=20260106T120000"
#
# Required variables:
#   - app_name: Name of the application to restore
#
# Optional variables:
#   - backup_timestamp: Specific backup to restore (default: latest)
#   - list_only: Just list backups, don't restore (default: false)
#   - backup_source: Path to backups (default: /mnt/backups)
#

- name: Find target host for application
  hosts: localhost
  gather_facts: false
  
  tasks:
    - name: Validate app_name is provided
      ansible.builtin.assert:
        that:
          - app_name is defined
          - app_name | length > 0
        fail_msg: "app_name variable must be provided"

    - name: Find host that manages this app
      ansible.builtin.set_fact:
        target_host: "{{ item }}"
      loop: "{{ groups['docker_hosts'] }}"
      when: app_name in (hostvars[item].managed_apps | default([]))

    - name: Fail if no host manages this app
      ansible.builtin.fail:
        msg: "No host found that manages app '{{ app_name }}'"
      when: target_host is not defined

    - name: Add target host to runtime group
      ansible.builtin.add_host:
        name: "{{ target_host }}"
        groups: restore_targets
        restore_app_name: "{{ app_name }}"
        restore_backup_timestamp: "{{ backup_timestamp | default('') }}"
        restore_list_only: "{{ list_only | default(false) }}"


- name: Restore Docker Volumes
  hosts: restore_targets
  gather_facts: true
  # Note: become is not needed if user is in docker group
  
  vars:
    app_name: "{{ restore_app_name }}"
    backup_source: /mnt/backups
    app_dir: "{{ app_base_dir }}/{{ app_name }}"
    app_backup_dir: "{{ backup_source }}/{{ app_name }}"
    requested_timestamp: "{{ restore_backup_timestamp }}"
    list_only: "{{ restore_list_only | bool }}"
    
    # Load telegram credentials from secrets file
    secrets_file: "{{ lookup('env', 'HOME') }}/.deploy-secrets"

  pre_tasks:
    - name: Load Telegram credentials
      ansible.builtin.shell: |
        if [[ -f "{{ secrets_file }}" ]]; then
          source "{{ secrets_file }}"
          echo "{\"bot_token\": \"${TELEGRAM_BOT_TOKEN:-}\", \"chat_id\": \"${TELEGRAM_CHAT_ID:-}\"}"
        else
          echo "{\"bot_token\": \"\", \"chat_id\": \"\"}"
        fi
      args:
        executable: /bin/bash
      register: telegram_creds_raw
      changed_when: false
      delegate_to: localhost
      run_once: true
      no_log: true

    - name: Parse Telegram credentials
      vars:
        telegram_creds: "{{ telegram_creds_raw.stdout | from_json }}"
      ansible.builtin.set_fact:
        telegram_bot_token: "{{ telegram_creds.bot_token }}"
        telegram_chat_id: "{{ telegram_creds.chat_id }}"
        telegram_enabled: "{{ telegram_creds.bot_token | length > 0 and telegram_creds.chat_id | length > 0 }}"
      run_once: true
      no_log: true

  tasks:
    - name: Verify backup source exists
      ansible.builtin.stat:
        path: "{{ app_backup_dir }}"
      register: backup_dir_stat

    - name: Fail if no backups exist
      ansible.builtin.fail:
        msg: "No backups found at {{ app_backup_dir }}"
      when: not backup_dir_stat.stat.exists

    - name: Find available backups
      ansible.builtin.find:
        paths: "{{ app_backup_dir }}"
        patterns: "*_*.tar.gz"
        file_type: file
      register: backup_files

    - name: Extract unique timestamps
      ansible.builtin.set_fact:
        available_timestamps: "{{ backup_files.files | map(attribute='path') | map('basename') | map('regex_replace', '^.*_([0-9T]+)\\.tar\\.gz$', '\\1') | unique | sort | reverse | list }}"

    - name: Display available backups
      ansible.builtin.debug:
        msg: |
          Available backups for {{ app_name }}:
          {% for ts in available_timestamps %}
          - {{ ts }}
          {% endfor %}
          
          Latest: {{ available_timestamps | first | default('none') }}

    - name: End play if list_only
      ansible.builtin.meta: end_play
      when: list_only | bool

    - name: Determine backup timestamp to restore
      ansible.builtin.set_fact:
        restore_timestamp: "{{ requested_timestamp if requested_timestamp | length > 0 else available_timestamps | first }}"

    - name: Validate requested timestamp exists
      ansible.builtin.fail:
        msg: "Backup timestamp {{ restore_timestamp }} not found. Available: {{ available_timestamps | join(', ') }}"
      when: restore_timestamp not in available_timestamps

    - name: Display restore plan
      ansible.builtin.debug:
        msg: |
          ========================================
          RESTORE PLAN
          ========================================
          Application: {{ app_name }}
          Host: {{ inventory_hostname }}
          Backup timestamp: {{ restore_timestamp }}
          ========================================
          
          ⚠️  WARNING: This will OVERWRITE existing data!

    - name: Confirm restore
      ansible.builtin.pause:
        prompt: "Type 'yes' to proceed with restore"
      register: confirm_restore
      when: not (auto_confirm | default(false) | bool)

    - name: Abort if not confirmed
      ansible.builtin.fail:
        msg: "Restore aborted by user"
      when:
        - not (auto_confirm | default(false) | bool)
        - confirm_restore.user_input != 'yes'

    - name: Find backup files for timestamp
      ansible.builtin.find:
        paths: "{{ app_backup_dir }}"
        patterns: "*_{{ restore_timestamp }}.tar.gz"
        file_type: file
      register: restore_files

    - name: Display files to restore
      ansible.builtin.debug:
        msg: "Will restore {{ restore_files.files | length }} volume(s)"

    # === STOP SERVICES ===
    - name: Check if app is running
      ansible.builtin.stat:
        path: "{{ app_dir }}/docker-compose.yml"
      register: compose_exists

    - name: Stop application stack
      ansible.builtin.command:
        cmd: "{{ docker_compose_cmd }} down"
        chdir: "{{ app_dir }}"
      when: compose_exists.stat.exists
      ignore_errors: true

    - name: Wait for containers to stop
      ansible.builtin.pause:
        seconds: 5

    # === RESTORE VOLUMES ===
    - name: Restore each volume
      ansible.builtin.shell: |
        BACKUP_FILE="{{ item.path }}"
        VOLUME_NAME=$(basename "${BACKUP_FILE}" | sed 's/_{{ restore_timestamp }}\.tar\.gz$//')
        
        echo "Restoring volume: ${VOLUME_NAME}"
        
        # Ensure volume exists
        docker volume create "${VOLUME_NAME}" 2>/dev/null || true
        
        # Clear existing data and restore
        docker run --rm \
          -v "${VOLUME_NAME}:/dest" \
          -v "{{ app_backup_dir }}:/backup:ro" \
          alpine:latest \
          sh -c "rm -rf /dest/* /dest/..?* /dest/.[!.]* 2>/dev/null; tar -xzf '/backup/$(basename {{ item.path }})' -C /dest"
        
        echo "SUCCESS: Restored ${VOLUME_NAME}"
      loop: "{{ restore_files.files }}"
      loop_control:
        label: "{{ item.path | basename }}"

    # === START SERVICES ===
    # Note: docker-compose.yml is NOT restored from backup as it's in GitHub.
    # Use the deploy playbook to restore configuration files.
    - name: Start application stack
      ansible.builtin.command:
        cmd: "{{ docker_compose_cmd }} up -d"
        chdir: "{{ app_dir }}"
      when: compose_exists.stat.exists

    - name: Wait for containers to initialize
      ansible.builtin.pause:
        seconds: 5

    # === HEALTH CHECK PHASE ===
    - name: Get services with healthchecks
      ansible.builtin.shell: |
        cd "{{ app_dir }}"
        if command -v jq &>/dev/null; then
          COUNT=$({{ docker_compose_cmd }} ps --format json 2>/dev/null | \
            jq -rs '[.[] | select(.Health != null and .Health != "")] | length' 2>/dev/null)
          if [[ $? -eq 0 && -n "$COUNT" ]]; then
            echo "$COUNT"
            exit 0
          fi
        fi
        {{ docker_compose_cmd }} ps 2>/dev/null | grep -cE '\(healthy\)|\(unhealthy\)|\(starting\)' || echo "0"
      args:
        executable: /bin/bash
      register: healthcheck_count
      changed_when: false
      when: compose_exists.stat.exists

    - name: Set healthcheck count
      ansible.builtin.set_fact:
        healthcheck_services: "{{ healthcheck_count.stdout | default('0') | int }}"
      when: compose_exists.stat.exists

    - name: Display healthcheck info
      ansible.builtin.debug:
        msg: "{{ 'No services with healthchecks found - skipping health verification' if healthcheck_services | int == 0 else 'Found ' + (healthcheck_services | string) + ' service(s) with healthchecks' }}"
      when: compose_exists.stat.exists

    - name: Wait for healthchecks to pass
      ansible.builtin.shell: |
        cd "{{ app_dir }}"
        
        check_with_jq() {
          local JSON=$({{ docker_compose_cmd }} ps --format json 2>/dev/null)
          TOTAL=$(echo "$JSON" | jq -rs '[.[] | select(.Health != null and .Health != "")] | length' 2>/dev/null) || return 1
          HEALTHY=$(echo "$JSON" | jq -rs '[.[] | select(.Health == "healthy")] | length' 2>/dev/null) || return 1
          UNHEALTHY=$(echo "$JSON" | jq -rs '[.[] | select(.Health == "unhealthy")] | length' 2>/dev/null) || return 1
          return 0
        }
        
        check_with_grep() {
          local PS_OUTPUT=$({{ docker_compose_cmd }} ps 2>/dev/null)
          TOTAL=$(echo "$PS_OUTPUT" | grep -cE '\(healthy\)|\(unhealthy\)|\(starting\)' || echo "0")
          HEALTHY=$(echo "$PS_OUTPUT" | grep -c '(healthy)' || echo "0")
          UNHEALTHY=$(echo "$PS_OUTPUT" | grep -c '(unhealthy)' || echo "0")
        }
        
        if command -v jq &>/dev/null && check_with_jq; then
          :
        else
          check_with_grep
        fi
        
        echo "healthy=$HEALTHY total=$TOTAL unhealthy=$UNHEALTHY"
        
        if [[ "$UNHEALTHY" -gt 0 ]]; then
          exit 2
        elif [[ "$TOTAL" -gt 0 && "$HEALTHY" -eq "$TOTAL" ]]; then
          exit 0
        else
          exit 1
        fi
      args:
        executable: /bin/bash
      register: health_status
      until: health_status.rc == 0
      retries: 12
      delay: 5
      failed_when: health_status.rc == 2
      changed_when: false
      when:
        - compose_exists.stat.exists
        - healthcheck_services | int > 0

    - name: Check for exited containers
      ansible.builtin.shell: |
        cd "{{ app_dir }}"
        if command -v jq &>/dev/null; then
          RESULT=$({{ docker_compose_cmd }} ps --format json 2>/dev/null | \
            jq -rs '[.[] | select(.State == "exited" or .State == "dead")] | .[].Service' 2>/dev/null)
          if [[ $? -eq 0 ]]; then
            echo "$RESULT"
            exit 0
          fi
        fi
        {{ docker_compose_cmd }} ps 2>/dev/null | grep -E "Exited|Dead" | awk '{print $1}' || true
      args:
        executable: /bin/bash
      register: exited_containers
      changed_when: false
      when: compose_exists.stat.exists

    - name: Fail if containers exited
      ansible.builtin.fail:
        msg: "Container(s) exited unexpectedly after restore: {{ exited_containers.stdout_lines | join(', ') }}"
      when:
        - compose_exists.stat.exists
        - exited_containers.stdout | length > 0

    - name: Verify services are running
      ansible.builtin.command:
        cmd: "{{ docker_compose_cmd }} ps"
        chdir: "{{ app_dir }}"
      register: services_status
      when: compose_exists.stat.exists

    - name: Display service status
      ansible.builtin.debug:
        msg: "{{ services_status.stdout_lines }}"
      when: compose_exists.stat.exists

    - name: Restore complete
      ansible.builtin.debug:
        msg: |
          ========================================
          ✅ RESTORE COMPLETED
          ========================================
          Application: {{ app_name }}
          Restored from: {{ restore_timestamp }}
          Volumes restored: {{ restore_files.files | length }}
          ========================================

    # === SEND NOTIFICATION ===
    - name: Get restored volume sizes
      ansible.builtin.shell: |
        for file in {{ restore_files.files | map(attribute='path') | join(' ') }}; do
          VOLUME_NAME=$(basename "$file" | sed 's/_{{ restore_timestamp }}\.tar\.gz$//')
          SIZE=$(du -h "$file" | cut -f1)
          echo "${VOLUME_NAME}:${SIZE}"
        done
      args:
        executable: /bin/bash
      register: restore_sizes_raw
      changed_when: false

    - name: Build volume details for notification
      ansible.builtin.set_fact:
        restore_details: "{{ restore_sizes_raw.stdout_lines | default([]) }}"
        restore_details_text: "{{ restore_sizes_raw.stdout_lines | default([]) | map('regex_replace', '^([^:]+):(.+)$', '  • \\1: \\2') | join('\n') }}"
        health_status_text: "{{ '✅ All healthchecks passed' if (healthcheck_services | default(0) | int > 0) else '⚠️ No healthchecks defined' }}"

    - name: Send success notification
      ansible.builtin.uri:
        url: "https://api.telegram.org/bot{{ telegram_bot_token }}/sendMessage"
        method: POST
        body_format: form-urlencoded
        body:
          chat_id: "{{ telegram_chat_id }}"
          text: "🔄 <b>Restore Completed</b>\n\n<b>Host:</b> <code>{{ inventory_hostname }}</code>\n<b>App:</b> <code>{{ app_name }}</code>\n<b>Backup:</b> <code>{{ restore_timestamp }}</code>\n\n<b>Volumes restored ({{ restore_files.files | length }}):</b>\n<pre>{{ restore_details_text }}</pre>\n\n{{ health_status_text }}"
          parse_mode: "HTML"
        status_code: [200]
      delegate_to: localhost
      when: telegram_enabled | bool
      ignore_errors: true
      no_log: true
