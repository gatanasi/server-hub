---
# restore-docker-volumes.yml - Restore Docker volumes from backup
#
# This playbook restores Docker volumes from a previous backup.
# It stops the application, restores volumes, and restarts services.
#
# Usage:
#   # List available backups for an app
#   ansible-playbook playbooks/restore-docker-volumes.yml -e "app_name=n8n list_only=true"
#
#   # Restore latest backup
#   ansible-playbook playbooks/restore-docker-volumes.yml -e "app_name=n8n"
#
#   # Restore specific backup by timestamp
#   ansible-playbook playbooks/restore-docker-volumes.yml -e "app_name=n8n backup_timestamp=20260106T120000"
#
# Required variables:
#   - app_name: Name of the application to restore
#
# Optional variables:
#   - backup_timestamp: Specific backup to restore (default: latest)
#   - list_only: Just list backups, don't restore (default: false)
#   - backup_source: Path to backups (default: /mnt/backups)
#

- name: Find target host for application
  hosts: localhost
  gather_facts: false

  tasks:
    - name: Validate app_name is provided
      ansible.builtin.assert:
        that:
          - app_name is defined
          - app_name | length > 0
        fail_msg: "app_name variable must be provided"

    - name: Find host that manages this app
      ansible.builtin.set_fact:
        target_host: "{{ item }}"
      loop: "{{ groups['docker_hosts'] }}"
      when: app_name in (hostvars[item].managed_apps | default([]))

    - name: Fail if no host manages this app
      ansible.builtin.fail:
        msg: "No host found that manages app '{{ app_name }}'"
      when: target_host is not defined

    - name: Add target host to runtime group
      ansible.builtin.add_host:
        name: "{{ target_host }}"
        groups: restore_targets
        restore_app_name: "{{ app_name }}"
        restore_backup_timestamp: "{{ backup_timestamp | default('') }}"
        restore_list_only: "{{ list_only | default(false) }}"


- name: Restore Docker Volumes
  hosts: restore_targets
  gather_facts: true
  # Note: become is not needed if user is in docker group

  vars:
    app_name: "{{ restore_app_name }}"
    app_dir: "{{ app_base_dir }}/{{ app_name }}"
    app_backup_dir: "{{ backup_source }}/{{ app_name }}"
    requested_timestamp: "{{ restore_backup_timestamp }}"
    list_only: "{{ restore_list_only | bool }}"

    # Load telegram credentials from secrets file
    secrets_file: "{{ lookup('env', 'HOME') }}/.deploy-secrets"

    # Note: The following variables are now defined in inventory/production.yml:
    # - backup_source: Backup source path for restore operations
    # - helper_image: Alpine image for restore operations
    # - health_check_buffer: Buffer time for health checks
    # - health_check_timeout_default: Default health check timeout

  pre_tasks:
    - name: Validate required variables
      ansible.builtin.assert:
        that:
          - docker_compose_cmd is defined
          - docker_compose_cmd | length > 0
          - app_base_dir is defined
          - app_base_dir | length > 0
        fail_msg: >
          Required variables missing. Ensure 'docker_compose_cmd' and 'app_base_dir' are defined
          in the inventory (e.g., group_vars/docker_hosts.yml).

    - name: Load Telegram credentials
      ansible.builtin.include_tasks: tasks/load-telegram-credentials.yml

  tasks:
    - name: Verify backup source exists
      ansible.builtin.stat:
        path: "{{ app_backup_dir }}"
      register: backup_dir_stat

    - name: Fail if no backups exist
      ansible.builtin.fail:
        msg: "No backups found at {{ app_backup_dir }}"
      when: not backup_dir_stat.stat.exists

    - name: Find available backups
      ansible.builtin.find:
        paths: "{{ app_backup_dir }}"
        patterns: "*_*.tar.gz"
        file_type: file
      register: backup_files

    - name: Extract unique timestamps
      ansible.builtin.set_fact:
        available_timestamps: >-
          {{
            backup_files.files | map(attribute='path') | map('basename') |
            map('regex_replace', '^.*_([0-9T]+)\\.tar\\.gz$', '\\1') |
            unique | sort | reverse | list
          }}

    - name: Display available backups
      ansible.builtin.debug:
        msg: |
          Available backups for {{ app_name }}:
          {% for ts in available_timestamps %}
          - {{ ts }}
          {% endfor %}

          Latest: {{ available_timestamps | first | default('none') }}

    - name: End play if list_only
      ansible.builtin.meta: end_play
      when: list_only | bool

    - name: Determine backup timestamp to restore
      ansible.builtin.set_fact:
        restore_timestamp: "{{ requested_timestamp if requested_timestamp | length > 0 else available_timestamps | first }}"

    - name: Validate requested timestamp exists
      ansible.builtin.fail:
        msg: "Backup timestamp {{ restore_timestamp }} not found. Available: {{ available_timestamps | join(', ') }}"
      when: restore_timestamp not in available_timestamps

    - name: Display restore plan
      ansible.builtin.debug:
        msg: |
          ========================================
          RESTORE PLAN
          ========================================
          Application: {{ app_name }}
          Host: {{ inventory_hostname }}
          Backup timestamp: {{ restore_timestamp }}
          ========================================

          ⚠️  WARNING: This will OVERWRITE existing data!

    - name: Confirm restore
      ansible.builtin.pause:
        prompt: "Type 'yes' to proceed with restore"
      register: confirm_restore
      when: not (auto_confirm | default(false) | bool)

    - name: Abort if not confirmed
      ansible.builtin.fail:
        msg: "Restore aborted by user"
      when:
        - not (auto_confirm | default(false) | bool)
        - confirm_restore.user_input != 'yes'

    - name: Find backup files for timestamp
      ansible.builtin.find:
        paths: "{{ app_backup_dir }}"
        patterns: "*_{{ restore_timestamp }}.tar.gz"
        file_type: file
      register: restore_files

    - name: Display files to restore
      ansible.builtin.debug:
        msg: "Will restore {{ restore_files.files | length }} volume(s)"

    - name: Validate backup files were found
      ansible.builtin.fail:
        msg: >
          No backup volume archives found for timestamp {{ restore_timestamp }} in
          {{ app_backup_dir }}. Cannot proceed with restore.
      when: (restore_files.files | default([])) | length == 0

    # === STOP SERVICES ===
    - name: Check if app is running
      ansible.builtin.stat:
        path: "{{ app_dir }}/docker-compose.yml"
      register: compose_exists

    - name: Stop application stack
      community.docker.docker_compose_v2:
        project_src: "{{ app_dir }}"
        state: absent
      when: compose_exists.stat.exists

    - name: Wait for containers to stop
      ansible.builtin.pause:
        seconds: 5

    # === RESTORE VOLUMES (with error handling) ===
    - name: Restore volumes block
      block:
        - name: Verify backup integrity
          ansible.builtin.command:
            cmd: "tar -tzf {{ item.path }}"
          loop: "{{ restore_files.files }}"
          changed_when: false
          # noqa: command-instead-of-module

        - name: Restore each volume
          ansible.builtin.shell: |
            set -euo pipefail
            BACKUP_FILE="{{ item.path }}"
            BASENAME="$(basename "${BACKUP_FILE}")"
            SUFFIX="_{{ restore_timestamp }}.tar.gz"
            VOLUME_NAME="${BASENAME%${SUFFIX}}"

            echo "Restoring volume: ${VOLUME_NAME}"

            # Ensure volume exists
            docker volume create "${VOLUME_NAME}" 2>/dev/null || true

            # Clear existing data and restore using find for safety
            # The '|| true' handles case where directory is already empty
            docker run --rm \
              -v "${VOLUME_NAME}:/dest" \
              -v "{{ app_backup_dir }}:/backup:ro" \
              {{ helper_image }} \
              sh -c "cd /dest && find . -mindepth 1 -maxdepth 1 -exec rm -rf {} + 2>/dev/null || true; tar -xzf '/backup/{{ item.path | basename }}' -C /dest"

            echo "SUCCESS: Restored ${VOLUME_NAME}"
          args:
            executable: /bin/bash
          loop: "{{ restore_files.files }}"
          loop_control:
            label: "{{ item.path | basename }}"
          changed_when: true

        # === START SERVICES ===
        # Note: docker-compose.yml is NOT restored from backup as it's in GitHub.
        # Use the deploy playbook to restore configuration files.
        - name: Start application stack
          community.docker.docker_compose_v2:
            project_src: "{{ app_dir }}"
            state: present
            wait: true
            wait_timeout: "{{ docker_compose_wait_timeout | default(90) }}"
          when: compose_exists.stat.exists
          register: services_status

        - name: Display service status
          ansible.builtin.debug:
            var: services_status.services
          when: compose_exists.stat.exists

        - name: Restore complete
          ansible.builtin.debug:
            msg: |
              ========================================
              ✅ RESTORE COMPLETED
              ========================================
              Application: {{ app_name }}
              Restored from: {{ restore_timestamp }}
              Volumes restored: {{ restore_files.files | length }}
              ========================================

        # === SEND NOTIFICATION ===
        - name: Get restored volume sizes
          ansible.builtin.command:
            cmd: ["du", "-h", "{{ item.path }}"]
          loop: "{{ restore_files.files }}"
          register: restore_sizes_result
          changed_when: false
          failed_when: false

        - name: Build volume details for notification
          ansible.builtin.set_fact:
            restore_details_text: |
              {%- for result in restore_sizes_result.results %}
              {%- if result.rc == 0 %}
                • {{ result.item.path | basename | regex_replace('_' + restore_timestamp + '\\.tar\\.gz$', '') }}: {{ result.stdout.split() | first }}
              {%- endif %}
              {%- endfor %}

        - name: Send success notification
          ansible.builtin.include_tasks: tasks/send-telegram-notification.yml
          vars:
            notify_title: "Restore Completed"
            notify_emoji: "🔄"
            notify_message: "<b>Host:</b> <code>{{ inventory_hostname }}</code>\n<b>App:</b> <code>{{ app_name }}</code>\n<b>Backup:</b> <code>{{ restore_timestamp }}</code>\n\n<b>Volumes restored ({{ restore_files.files | length }}):</b>\n<pre>{{ restore_details_text }}</pre>\n\n✅ Service Restored & Healthy" # noqa: yaml[line-length]

      rescue:
        - name: Attempt to restart services after restore failure
          community.docker.docker_compose_v2:
            project_src: "{{ app_dir }}"
            state: present
            wait: true
            wait_timeout: "{{ docker_compose_wait_timeout | default(90) }}"
          when: compose_exists.stat.exists
          failed_when: false

        - name: Send failure notification
          ansible.builtin.include_tasks: tasks/send-telegram-notification.yml
          vars:
            notify_title: "Restore Failed"
            notify_emoji: "❌"
            notify_message: "<b>Host:</b> <code>{{ inventory_hostname }}</code>\n<b>App:</b> <code>{{ app_name }}</code>\n<b>Backup:</b> <code>{{ restore_timestamp }}</code>\n\n⚠️ Services have been restarted" # noqa: yaml[line-length]

        - name: Fail the restore task
          ansible.builtin.fail:
            msg: "Restore failed for {{ app_name }} on {{ inventory_hostname }}"
