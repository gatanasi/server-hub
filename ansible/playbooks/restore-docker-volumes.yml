---
# restore-docker-volumes.yml - Restore Docker volumes from backup
#
# This playbook restores Docker volumes from a previous backup.
# It stops the application, restores volumes, and restarts services.
#
# Usage:
#   # List available backups for an app
#   ansible-playbook playbooks/restore-docker-volumes.yml -e "app_name=n8n list_only=true"
#
#   # Restore latest backup
#   ansible-playbook playbooks/restore-docker-volumes.yml -e "app_name=n8n"
#
#   # Restore specific backup by timestamp
#   ansible-playbook playbooks/restore-docker-volumes.yml -e "app_name=n8n backup_timestamp=20260106T120000"
#
# Required variables:
#   - app_name: Name of the application to restore
#
# Optional variables:
#   - backup_timestamp: Specific backup to restore (default: latest)
#   - list_only: Just list backups, don't restore (default: false)
#   - backup_source: Path to backups (default: /mnt/backups)
#

- name: Find target host for application
  hosts: localhost
  gather_facts: false
  
  tasks:
    - name: Validate app_name is provided
      ansible.builtin.assert:
        that:
          - app_name is defined
          - app_name | length > 0
        fail_msg: "app_name variable must be provided"

    - name: Find host that manages this app
      ansible.builtin.set_fact:
        target_host: "{{ item }}"
      loop: "{{ groups['docker_hosts'] }}"
      when: app_name in (hostvars[item].managed_apps | default([]))

    - name: Fail if no host manages this app
      ansible.builtin.fail:
        msg: "No host found that manages app '{{ app_name }}'"
      when: target_host is not defined

    - name: Add target host to runtime group
      ansible.builtin.add_host:
        name: "{{ target_host }}"
        groups: restore_targets
        restore_app_name: "{{ app_name }}"
        restore_backup_timestamp: "{{ backup_timestamp | default('') }}"
        restore_list_only: "{{ list_only | default(false) }}"


- name: Restore Docker Volumes
  hosts: restore_targets
  gather_facts: true
  become: true
  
  vars:
    app_name: "{{ restore_app_name }}"
    backup_source: /mnt/backups
    app_dir: "{{ app_base_dir }}/{{ app_name }}"
    app_backup_dir: "{{ backup_source }}/{{ inventory_hostname }}/{{ app_name }}"
    requested_timestamp: "{{ restore_backup_timestamp }}"
    list_only: "{{ restore_list_only | bool }}"

  tasks:
    - name: Verify backup source exists
      ansible.builtin.stat:
        path: "{{ app_backup_dir }}"
      register: backup_dir_stat

    - name: Fail if no backups exist
      ansible.builtin.fail:
        msg: "No backups found at {{ app_backup_dir }}"
      when: not backup_dir_stat.stat.exists

    - name: Find available backups
      ansible.builtin.find:
        paths: "{{ app_backup_dir }}"
        patterns: "*_*.tar.gz"
        file_type: file
      register: backup_files

    - name: Extract unique timestamps
      ansible.builtin.set_fact:
        available_timestamps: "{{ backup_files.files | map(attribute='path') | map('basename') | map('regex_replace', '^.*_([0-9T]+)\\.tar\\.gz$', '\\1') | unique | sort | reverse | list }}"

    - name: Display available backups
      ansible.builtin.debug:
        msg: |
          Available backups for {{ app_name }}:
          {% for ts in available_timestamps %}
          - {{ ts }}
          {% endfor %}
          
          Latest: {{ available_timestamps | first | default('none') }}

    - name: End play if list_only
      ansible.builtin.meta: end_play
      when: list_only | bool

    - name: Determine backup timestamp to restore
      ansible.builtin.set_fact:
        restore_timestamp: "{{ requested_timestamp if requested_timestamp | length > 0 else available_timestamps | first }}"

    - name: Validate requested timestamp exists
      ansible.builtin.fail:
        msg: "Backup timestamp {{ restore_timestamp }} not found. Available: {{ available_timestamps | join(', ') }}"
      when: restore_timestamp not in available_timestamps

    - name: Display restore plan
      ansible.builtin.debug:
        msg: |
          ========================================
          RESTORE PLAN
          ========================================
          Application: {{ app_name }}
          Host: {{ inventory_hostname }}
          Backup timestamp: {{ restore_timestamp }}
          ========================================
          
          ⚠️  WARNING: This will OVERWRITE existing data!

    - name: Confirm restore
      ansible.builtin.pause:
        prompt: "Type 'yes' to proceed with restore"
      register: confirm_restore
      when: not (auto_confirm | default(false) | bool)

    - name: Abort if not confirmed
      ansible.builtin.fail:
        msg: "Restore aborted by user"
      when:
        - not (auto_confirm | default(false) | bool)
        - confirm_restore.user_input != 'yes'

    - name: Find backup files for timestamp
      ansible.builtin.find:
        paths: "{{ app_backup_dir }}"
        patterns: "*_{{ restore_timestamp }}.tar.gz"
        file_type: file
      register: restore_files

    - name: Display files to restore
      ansible.builtin.debug:
        msg: "Will restore {{ restore_files.files | length }} volume(s)"

    # === STOP SERVICES ===
    - name: Check if app is running
      ansible.builtin.stat:
        path: "{{ app_dir }}/docker-compose.yml"
      register: compose_exists

    - name: Stop application stack
      ansible.builtin.command:
        cmd: "{{ docker_compose_cmd }} down"
        chdir: "{{ app_dir }}"
      when: compose_exists.stat.exists
      ignore_errors: true

    - name: Wait for containers to stop
      ansible.builtin.pause:
        seconds: 5

    # === RESTORE VOLUMES ===
    - name: Restore each volume
      ansible.builtin.shell: |
        BACKUP_FILE="{{ item.path }}"
        VOLUME_NAME=$(basename "${BACKUP_FILE}" | sed 's/_{{ restore_timestamp }}\.tar\.gz$//')
        
        echo "Restoring volume: ${VOLUME_NAME}"
        
        # Ensure volume exists
        docker volume create "${VOLUME_NAME}" 2>/dev/null || true
        
        # Clear existing data and restore
        docker run --rm \
          -v "${VOLUME_NAME}:/dest" \
          -v "{{ app_backup_dir }}:/backup:ro" \
          alpine:latest \
          sh -c "rm -rf /dest/* /dest/..?* /dest/.[!.]* 2>/dev/null; tar -xzf '/backup/$(basename {{ item.path }})' -C /dest"
        
        echo "SUCCESS: Restored ${VOLUME_NAME}"
      loop: "{{ restore_files.files }}"
      loop_control:
        label: "{{ item.path | basename }}"

    # === RESTORE COMPOSE FILE (if backed up) ===
    - name: Check for backed up docker-compose.yml
      ansible.builtin.stat:
        path: "{{ app_backup_dir }}/docker-compose_{{ restore_timestamp }}.yml"
      register: compose_backup

    - name: Restore docker-compose.yml (optional)
      ansible.builtin.copy:
        src: "{{ app_backup_dir }}/docker-compose_{{ restore_timestamp }}.yml"
        dest: "{{ app_dir }}/docker-compose.yml"
        remote_src: true
        mode: '0644'
        backup: true
      when: 
        - compose_backup.stat.exists
        - restore_compose | default(false) | bool

    # === START SERVICES ===
    - name: Start application stack
      ansible.builtin.command:
        cmd: "{{ docker_compose_cmd }} up -d"
        chdir: "{{ app_dir }}"
      when: compose_exists.stat.exists

    - name: Wait for services to start
      ansible.builtin.pause:
        seconds: 15

    - name: Verify services are running
      ansible.builtin.command:
        cmd: "{{ docker_compose_cmd }} ps"
        chdir: "{{ app_dir }}"
      register: services_status
      when: compose_exists.stat.exists

    - name: Display service status
      ansible.builtin.debug:
        msg: "{{ services_status.stdout_lines }}"
      when: compose_exists.stat.exists

    - name: Restore complete
      ansible.builtin.debug:
        msg: |
          ========================================
          ✅ RESTORE COMPLETED
          ========================================
          Application: {{ app_name }}
          Restored from: {{ restore_timestamp }}
          Volumes restored: {{ restore_files.files | length }}
          ========================================
