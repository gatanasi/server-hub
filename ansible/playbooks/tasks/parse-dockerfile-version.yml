---
- name: Parse version from Dockerfile content
  ansible.builtin.set_fact:
    "{{ output_fact }}": "{{ (
        (dockerfile_content | b64decode | regex_replace('^\\s*#.*$', '', multiline=True) |
        regex_findall('FROM\\s+(?:--platform=\\S+\\s+)?\\S+:([^@\\s]+)') | last) |
        default(lookup('vars', output_fact), true)
      ) }}"
