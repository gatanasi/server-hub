---
- name: Parse version from Dockerfile content
  vars:
    _from_keyword_re: '[Ff][Rr][Oo][Mm]'

    # 1. Decode and strip comments (full line comments)
    _content_no_comments: "{{ dockerfile_content | b64decode | regex_replace('^\\s*#.*$', '', multiline=True) }}"

    # 2. Get all FROM lines (case-insensitive)
    _from_lines: "{{ _content_no_comments | regex_findall('^' + _from_keyword_re + '.*$', multiline=True) }}"

    # 3. Get the last FROM instruction (safe slicing)
    _last_from_line: "{{ (_from_lines[-1:] | first) | default('') }}"

    # 4. Extract image spec SAFELY using Regex
    # - Handles 'FROM' + generic flags (e.g. --platform=...) + image
    # - Stops at whitespace OR '#' (inline comments)
    _image_spec: "{{ _last_from_line | regex_search('^' + _from_keyword_re + '(?:\\s+--\\S+)*\\s+([^\\s#]+)', '\\1') | first | default('') }}"

    # 5. Remove digest (e.g., @sha256:...) and split by colon
    _image_parts: "{{ (_image_spec.split('@') | first).split(':') }}"
    _potential_tag: "{{ _image_parts | last }}"

    # 6. Validate Tag:
    # - Must have more than 1 part (otherwise it's just 'ubuntu' -> implicit latest)
    # - Tag cannot contain '/' (if it does, it's actually a port like 'registry:5000/image')
    # - Tag cannot start with '$' (otherwise it's a build ARG like 'image:$VERSION')
    _is_valid_tag: "{{ (_image_parts | length > 1) and ('/' not in _potential_tag) and not _potential_tag.startswith('$') }}"
    _parsed_version: "{{ _potential_tag if _is_valid_tag else '' }}"

  ansible.builtin.set_fact:
    "{{ output_fact }}": "{{ _parsed_version }}"
  when: _parsed_version | length > 0
