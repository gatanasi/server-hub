---
# load-telegram-credentials.yml - Load Telegram credentials from secrets file
#
# This task file loads Telegram bot credentials from the deployer's secrets file.
# It should be run on localhost with run_once for efficiency.
#
# Optional variables:
#   - secrets_file: Path to the secrets file (default: ~/.deploy-secrets)
#
# Sets facts:
#   - telegram_bot_token: The Telegram bot token
#   - telegram_chat_id: The Telegram chat ID
#   - telegram_enabled: Boolean indicating if notifications are enabled
#

- name: Set default secrets file path
  ansible.builtin.set_fact:
    _secrets_file: "{{ secrets_file | default(lookup('env', 'HOME') + '/.deploy-secrets') }}"
  run_once: true

- name: Load Telegram credentials
  ansible.builtin.shell: |
    if [[ -f "{{ _secrets_file }}" ]]; then
      source "{{ _secrets_file }}"
      echo "{\"bot_token\": \"${TELEGRAM_BOT_TOKEN:-}\", \"chat_id\": \"${TELEGRAM_CHAT_ID:-}\"}"
    else
      echo "{\"bot_token\": \"\", \"chat_id\": \"\"}"
    fi
  args:
    executable: /bin/bash
  register: telegram_creds_raw
  changed_when: false
  delegate_to: localhost
  run_once: true
  no_log: true

- name: Parse Telegram credentials
  vars:
    telegram_creds: "{{ telegram_creds_raw.stdout | from_json }}"
  ansible.builtin.set_fact:
    telegram_bot_token: "{{ telegram_creds.bot_token }}"
    telegram_chat_id: "{{ telegram_creds.chat_id }}"
    telegram_enabled: "{{ telegram_creds.bot_token | length > 0 and telegram_creds.chat_id | length > 0 }}"
  run_once: true
  no_log: true
