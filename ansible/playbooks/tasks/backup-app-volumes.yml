---
# backup-app-volumes.yml - Backup Docker volumes for a single application
#
# This task file is included by backup-docker-volumes.yml for each app.
# It stops the app, backs up volumes, and restarts the app.
#
# Required variables:
#   - current_app: Name of the application to backup
#   - backup_destination: Base path for backups
#   - backup_timestamp: Timestamp string for backup filename
#

- name: Set app variables for {{ current_app }}
  ansible.builtin.set_fact:
    app_dir: "{{ app_base_dir }}/{{ current_app }}"
    app_backup_dir: "{{ backup_destination }}/{{ current_app }}"

- name: Check if app directory exists for {{ current_app }}
  ansible.builtin.stat:
    path: "{{ app_dir }}/docker-compose.yml"
  register: app_compose_file

- name: Skip if app not deployed for {{ current_app }}
  ansible.builtin.debug:
    msg: "Skipping {{ current_app }} - not deployed on {{ inventory_hostname }}"
  when: not app_compose_file.stat.exists

- name: Backup application for {{ current_app }}
  when: app_compose_file.stat.exists
  block:
    - name: Create app backup directory (try without sudo) for {{ current_app }}
      ansible.builtin.file:
        path: "{{ app_backup_dir }}"
        state: directory
        mode: '0750'
      register: app_mkdir_result
      ignore_errors: true

    - name: Create app backup directory (with sudo if needed) for {{ current_app }}
      ansible.builtin.file:
        path: "{{ app_backup_dir }}"
        state: directory
        mode: '0750'
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
      become: true
      when: app_mkdir_result is failed

    - name: Get docker compose config JSON for {{ current_app }}
      ansible.builtin.command:
        cmd: "{{ docker_compose_cmd }} config --format json"
        chdir: "{{ app_dir }}"
      register: compose_config_raw
      changed_when: false

    - name: Parse project name from config for {{ current_app }}
      ansible.builtin.set_fact:
        project_name: "{{ (compose_config_raw.stdout | from_json).name | default(current_app) }}"

    - name: Get Docker volume full names for {{ current_app }}
      ansible.builtin.command:
        cmd: "docker volume ls --format '{{ '{{' }}.Name{{ '}}' }}' --filter 'name=^{{ project_name | regex_escape }}_'"
      register: docker_volumes_raw
      changed_when: false

    - name: Set Docker volume list for {{ current_app }}
      ansible.builtin.set_fact:
        docker_volumes: "{{ docker_volumes_raw.stdout_lines | select | list }}"

    - name: Display volumes to backup for {{ current_app }}
      ansible.builtin.debug:
        msg: "Will backup {{ docker_volumes | length }} volume(s): {{ docker_volumes | join(', ') }}"

    - name: Skip if no volumes for {{ current_app }}
      ansible.builtin.debug:
        msg: "No Docker volumes found for {{ current_app }}"
      when: docker_volumes | length == 0

    # === STOP SERVICES ===
    - name: Stop application stack for {{ current_app }}
      ansible.builtin.command:
        cmd: "{{ docker_compose_cmd }} stop -t {{ stop_timeout }}"
        chdir: "{{ app_dir }}"
      register: stop_result
      when: docker_volumes | length > 0
      changed_when: true

    - name: Wait for containers to stop for {{ current_app }}
      ansible.builtin.pause:
        seconds: 5
      when: docker_volumes | length > 0

    # === BACKUP VOLUMES ===
    - name: Backup each volume for {{ current_app }}
      ansible.builtin.shell: |
        set -euo pipefail
        VOLUME_NAME="{{ item }}"
        BACKUP_FILE="{{ app_backup_dir }}/{{ item }}_{{ backup_timestamp }}.tar.gz"

        echo "Backing up volume: ${VOLUME_NAME}"

        # Create backup using a temporary container
        docker run --rm \
          -v "${VOLUME_NAME}:/source:ro" \
          -v "{{ app_backup_dir }}:/backup" \
          {{ helper_image }} \
          tar -czf "/backup/{{ item }}_{{ backup_timestamp }}.tar.gz" -C /source .

        # Verify backup was created
        if [ -f "${BACKUP_FILE}" ]; then
          SIZE="$(du -h "${BACKUP_FILE}" | cut -f1)"
          echo "SUCCESS: Created ${BACKUP_FILE} (${SIZE})"
        else
          echo "ERROR: Failed to create backup for ${VOLUME_NAME}"
          exit 1
        fi
      args:
        executable: /bin/bash
      loop: "{{ docker_volumes }}"
      register: backup_results
      when: docker_volumes | length > 0
      changed_when: true

    # === RESTART SERVICES ===
    # Note: docker-compose.yml and .env files are NOT backed up by this task;
    # they are stored in GitHub (with SOPS encryption for .env) and restored
    # by re-running the deploy playbook. In a disaster recovery scenario,
    # first run the deploy playbook to recreate the application config and
    # docker-compose stack from Git, then restore the volume backups created
    # by this playbook.
    - name: Start application stack for {{ current_app }}
      community.docker.docker_compose_v2:
        project_src: "{{ app_dir }}"
        state: present
        wait: true
        wait_timeout: "{{ docker_compose_wait_timeout | default(90) }}"
      register: start_result
      when: docker_volumes | length > 0

    - name: Get backup sizes for {{ current_app }}
      ansible.builtin.command:
        cmd: ["du", "-h", "{{ app_backup_dir }}/{{ item }}_{{ backup_timestamp }}.tar.gz"]
      loop: "{{ docker_volumes }}"
      register: backup_sizes_result
      changed_when: false
      failed_when: false
      when: docker_volumes | length > 0

    - name: Parse backup sizes for {{ current_app }}
      ansible.builtin.set_fact:
        backup_details: >-
          {%- set ns = namespace(details=[]) -%}
          {%- for result in backup_sizes_result.results if result.rc == 0 -%}
            {%- set ns.details = ns.details + [result.item ~ ':' ~ (result.stdout.split() | first)] -%}
          {%- endfor -%}
          {{ ns.details }}
      when: docker_volumes | length > 0

    - name: Display backup summary for {{ current_app }}
      ansible.builtin.debug:
        msg: |
          ✅ Backup completed for {{ current_app }}
          Volumes backed up: {{ docker_volumes | length }}
          Location: {{ app_backup_dir }}
          Details: {{ backup_details | join(', ') }}
      when: docker_volumes | length > 0

    # === SEND NOTIFICATION ===
    - name: Build volume details for notification for {{ current_app }}
      ansible.builtin.set_fact:
        volume_details_text: "{{ backup_details | map('regex_replace', '^([^:]+):(.+)$', '  • \\1: \\2') | join('\n') }}"
      when: docker_volumes | length > 0

    - name: Send success notification for {{ current_app }}
      ansible.builtin.uri:
        url: "https://api.telegram.org/bot{{ telegram_bot_token }}/sendMessage"
        method: POST
        body_format: form-urlencoded
        body:
          chat_id: "{{ telegram_chat_id }}"
          text: >-
            💾 <b>Backup Completed</b>

            <b>Host:</b> <code>{{ inventory_hostname }}</code>
            <b>App:</b> <code>{{ current_app }}</code>

            <b>Volumes ({{ docker_volumes | length }}):</b>
            <pre>{{ volume_details_text }}</pre>

            ✅ Service Restored & Healthy
          parse_mode: "HTML"
        status_code: [200]
      delegate_to: localhost
      when:
        - telegram_enabled | bool
        - docker_volumes | length > 0
      failed_when: false
      no_log: true

  rescue:
    - name: Ensure services are running after backup failure for {{ current_app }}
      community.docker.docker_compose_v2:
        project_src: "{{ app_dir }}"
        state: present
        wait: true
        wait_timeout: "{{ docker_compose_wait_timeout | default(90) }}"
      failed_when: false

    - name: Send failure notification for {{ current_app }}
      ansible.builtin.uri:
        url: "https://api.telegram.org/bot{{ telegram_bot_token }}/sendMessage"
        method: POST
        body_format: form-urlencoded
        body:
          chat_id: "{{ telegram_chat_id }}"
          text: "❌ <b>Backup FAILED</b>\n\nHost: <code>{{ inventory_hostname }}</code>\nApp: <code>{{ current_app }}</code>\n\n⚠️ Services have been restarted"
          parse_mode: "HTML"
        status_code: [200]
      delegate_to: localhost
      when: telegram_enabled | bool
      failed_when: false
      no_log: true

    - name: Fail the task for {{ current_app }}
      ansible.builtin.fail:
        msg: "Backup failed for {{ current_app }} on {{ inventory_hostname }}"
