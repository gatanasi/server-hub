---
# backup-app-volumes.yml - Backup Docker volumes for a single application
#
# This task file is included by backup-docker-volumes.yml for each app.
# It stops the app, backs up volumes, and restarts the app.
#
# Required variables:
#   - current_app: Name of the application to backup
#   - backup_destination: Base path for backups
#   - backup_timestamp: Timestamp string for backup filename
#

- name: "{{ current_app }} | Set app variables"
  ansible.builtin.set_fact:
    app_dir: "{{ app_base_dir }}/{{ current_app }}"
    app_backup_dir: "{{ backup_destination }}/{{ current_app }}"

- name: "{{ current_app }} | Check if app directory exists"
  ansible.builtin.stat:
    path: "{{ app_dir }}/docker-compose.yml"
  register: app_compose_file

- name: "{{ current_app }} | Skip if app not deployed"
  ansible.builtin.debug:
    msg: "Skipping {{ current_app }} - not deployed on {{ inventory_hostname }}"
  when: not app_compose_file.stat.exists

- name: "{{ current_app }} | Backup application"
  when: app_compose_file.stat.exists
  block:
    - name: "{{ current_app }} | Create app backup directory (try without sudo)"
      ansible.builtin.file:
        path: "{{ app_backup_dir }}"
        state: directory
        mode: '0750'
      register: app_mkdir_result
      ignore_errors: true

    - name: "{{ current_app }} | Create app backup directory (with sudo if needed)"
      ansible.builtin.file:
        path: "{{ app_backup_dir }}"
        state: directory
        mode: '0750'
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
      become: true
      when: app_mkdir_result is failed

    - name: "{{ current_app }} | Get docker compose config JSON"
      ansible.builtin.command:
        cmd: "{{ docker_compose_cmd }} config --format json"
        chdir: "{{ app_dir }}"
      register: compose_config_raw
      changed_when: false

    - name: "{{ current_app }} | Parse project name from config"
      ansible.builtin.set_fact:
        project_name: "{{ (compose_config_raw.stdout | from_json).name | default(current_app) }}"

    - name: "{{ current_app }} | Get Docker volume full names"
      ansible.builtin.command:
        cmd: "docker volume ls --format '{{ '{{' }}.Name{{ '}}' }}' --filter 'name=^{{ project_name | regex_escape }}_'"
      register: docker_volumes_raw
      changed_when: false

    - name: "{{ current_app }} | Set Docker volume list"
      ansible.builtin.set_fact:
        docker_volumes: "{{ docker_volumes_raw.stdout_lines | select | list }}"

    - name: "{{ current_app }} | Display volumes to backup"
      ansible.builtin.debug:
        msg: "Will backup {{ docker_volumes | length }} volume(s): {{ docker_volumes | join(', ') }}"

    - name: "{{ current_app }} | Skip if no volumes"
      ansible.builtin.debug:
        msg: "No Docker volumes found for {{ current_app }}"
      when: docker_volumes | length == 0

    # === STOP SERVICES ===
    - name: "{{ current_app }} | Stop application stack"
      ansible.builtin.command:
        cmd: "{{ docker_compose_cmd }} stop -t {{ stop_timeout }}"
        chdir: "{{ app_dir }}"
      register: stop_result
      when: docker_volumes | length > 0

    - name: "{{ current_app }} | Wait for containers to stop"
      ansible.builtin.pause:
        seconds: 5
      when: docker_volumes | length > 0

    # === BACKUP VOLUMES ===
    - name: "{{ current_app }} | Backup each volume"
      ansible.builtin.shell: |
        set -euo pipefail
        VOLUME_NAME="{{ item }}"
        BACKUP_FILE="{{ app_backup_dir }}/{{ item }}_{{ backup_timestamp }}.tar.gz"
        
        echo "Backing up volume: ${VOLUME_NAME}"
        
        # Create backup using a temporary container
        docker run --rm \
          -v "${VOLUME_NAME}:/source:ro" \
          -v "{{ app_backup_dir }}:/backup" \
          {{ helper_image }} \
          tar -czf "/backup/{{ item }}_{{ backup_timestamp }}.tar.gz" -C /source .
        
        # Verify backup was created
        if [ -f "${BACKUP_FILE}" ]; then
          SIZE="$(du -h "${BACKUP_FILE}" | cut -f1)"
          echo "SUCCESS: Created ${BACKUP_FILE} (${SIZE})"
        else
          echo "ERROR: Failed to create backup for ${VOLUME_NAME}"
          exit 1
        fi
      args:
        executable: /bin/bash
      loop: "{{ docker_volumes }}"
      register: backup_results
      when: docker_volumes | length > 0

    # === RESTART SERVICES ===
    # Note: docker-compose.yml and .env files are NOT backed up by this task;
    # they are stored in GitHub (with SOPS encryption for .env) and restored
    # by re-running the deploy playbook. In a disaster recovery scenario,
    # first run the deploy playbook to recreate the application config and
    # docker-compose stack from Git, then restore the volume backups created
    # by this playbook.
    - name: "{{ current_app }} | Start application stack"
      ansible.builtin.command:
        cmd: "{{ docker_compose_cmd }} start"
        chdir: "{{ app_dir }}"
      register: start_result
      when: docker_volumes | length > 0

    - name: "{{ current_app }} | Wait for containers to initialize"
      ansible.builtin.pause:
        seconds: 5
      when: docker_volumes | length > 0

    # === HEALTH CHECK PHASE ===
    - name: "{{ current_app }} | Extract max healthcheck start_period"
      ansible.builtin.include_tasks: tasks/extract-max-start-period.yml
      # app_dir is already defined in this scope and will be inherited by the included tasks
      when: docker_volumes | length > 0

    - name: "{{ current_app }} | Set health check timeout"
      ansible.builtin.set_fact:
        health_check_timeout: "{{ [((compose_max_start_period | int) + (health_check_buffer | int)), (health_check_timeout_default | int)] | max }}"
      when: docker_volumes | length > 0

    - name: "{{ current_app }} | Verify service health"
      ansible.builtin.include_tasks: verify-service-health.yml
      vars:
        fail_on_unhealthy: true
      when: docker_volumes | length > 0

    - name: "{{ current_app }} | Verify services are running"
      ansible.builtin.command:
        cmd: "{{ docker_compose_cmd }} ps"
        chdir: "{{ app_dir }}"
      register: services_status
      changed_when: false
      when: docker_volumes | length > 0

    - name: "{{ current_app }} | Get backup sizes"
      ansible.builtin.command:
        cmd: "du -h {{ app_backup_dir }}/{{ item }}_{{ backup_timestamp }}.tar.gz"
      loop: "{{ docker_volumes }}"
      register: backup_sizes_result
      changed_when: false
      failed_when: false
      when: docker_volumes | length > 0

    - name: "{{ current_app }} | Parse backup sizes"
      ansible.builtin.set_fact:
        backup_details: >-
          [{% for result in backup_sizes_result.results %}
          {% if result.rc == 0 %}
          "{{ result.item }}:{{ result.stdout.split() | first }}"{{ "," if not loop.last else "" }}
          {% endif %}
          {% endfor %}]
      when: docker_volumes | length > 0

    - name: "{{ current_app }} | Display backup summary"
      ansible.builtin.debug:
        msg: |
          ✅ Backup completed for {{ current_app }}
          Volumes backed up: {{ docker_volumes | length }}
          Location: {{ app_backup_dir }}
          Details: {{ backup_details | join(', ') }}
      when: docker_volumes | length > 0

    # === SEND NOTIFICATION ===
    - name: "{{ current_app }} | Build volume details for notification"
      ansible.builtin.set_fact:
        volume_details_text: "{{ backup_details | map('regex_replace', '^([^:]+):(.+)$', '  • \\1: \\2') | join('\n') }}"
        health_status_text: "{{ '✅ All healthchecks passed' if (healthcheck_services | default(0) | int > 0) else '⚠️ No healthchecks defined' }}"
      when: docker_volumes | length > 0

    - name: "{{ current_app }} | Send success notification"
      ansible.builtin.uri:
        url: "https://api.telegram.org/bot{{ telegram_bot_token }}/sendMessage"
        method: POST
        body_format: form-urlencoded
        body:
          chat_id: "{{ telegram_chat_id }}"
          text: "💾 <b>Backup Completed</b>\n\n<b>Host:</b> <code>{{ inventory_hostname }}</code>\n<b>App:</b> <code>{{ current_app }}</code>\n\n<b>Volumes ({{ docker_volumes | length }}):</b>\n<pre>{{ volume_details_text }}</pre>\n\n{{ health_status_text }}"
          parse_mode: "HTML"
        status_code: [200]
      delegate_to: localhost
      when:
        - telegram_enabled | bool
        - docker_volumes | length > 0
      ignore_errors: true
      no_log: true

  rescue:
    - name: "{{ current_app }} | Backup failed - ensure services are running"
      ansible.builtin.command:
        cmd: "{{ docker_compose_cmd }} up -d"
        chdir: "{{ app_dir }}"
      ignore_errors: true

    - name: "{{ current_app }} | Send failure notification"
      ansible.builtin.uri:
        url: "https://api.telegram.org/bot{{ telegram_bot_token }}/sendMessage"
        method: POST
        body_format: form-urlencoded
        body:
          chat_id: "{{ telegram_chat_id }}"
          text: "❌ <b>Backup FAILED</b>\n\nHost: <code>{{ inventory_hostname }}</code>\nApp: <code>{{ current_app }}</code>\n\n⚠️ Services have been restarted"
          parse_mode: "HTML"
        status_code: [200]
      delegate_to: localhost
      when: telegram_enabled | bool
      ignore_errors: true
      no_log: true

    - name: "{{ current_app }} | Fail the task"
      ansible.builtin.fail:
        msg: "Backup failed for {{ current_app }} on {{ inventory_hostname }}"
