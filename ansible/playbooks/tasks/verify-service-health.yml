---
# verify-service-health.yml - Reusable health check verification for Docker services
#
# This task file verifies that Docker Compose services are healthy after operations
# like deploy, backup, or restore.
#
# Required variables:
#   - app_dir: Path to the docker-compose.yml directory
#   - docker_compose_cmd: Docker compose command (e.g., "docker compose")
#
# Optional variables:
#   - health_check_timeout: Total timeout in seconds (default: 60)
#   - health_check_interval: Interval between checks in seconds (default: 5)
#   - skip_health_check: Skip health verification (default: false)
#
# Sets facts:
#   - healthcheck_services: Number of services with healthchecks
#   - health_check_passed: Boolean indicating if health check passed
#   - no_healthchecks_defined: Boolean if no healthchecks are defined
#

- name: Skip health check if requested
  ansible.builtin.set_fact:
    health_check_passed: true
    healthcheck_services: 0
    no_healthchecks_defined: true
  when: skip_health_check | default(false) | bool

- name: Verify service health
  when: not (skip_health_check | default(false) | bool)
  block:
    - name: Get services with healthchecks
      ansible.builtin.shell: |
        cd "{{ app_dir }}"
        if command -v jq &>/dev/null; then
          COUNT=$({{ docker_compose_cmd }} ps --format json 2>/dev/null | \
            jq -rs '[.[] | select(.Health != null and .Health != "")] | length' 2>/dev/null)
          if [[ $? -eq 0 && -n "$COUNT" ]]; then
            echo "$COUNT"
            exit 0
          fi
        fi
        {{ docker_compose_cmd }} ps 2>/dev/null | grep -cE '\(healthy\)|\(unhealthy\)|\(starting\)' || echo "0"
      args:
        executable: /bin/bash
      register: healthcheck_count
      changed_when: false

    - name: Set healthcheck count
      ansible.builtin.set_fact:
        healthcheck_services: "{{ healthcheck_count.stdout | default('0') | int }}"
        no_healthchecks_defined: "{{ (healthcheck_count.stdout | default('0') | int) == 0 }}"

    - name: Display healthcheck info
      ansible.builtin.debug:
        msg: "{{ 'No services with healthchecks found - skipping health verification' if no_healthchecks_defined else 'Found ' + (healthcheck_services | string) + ' service(s) with healthchecks' }}"

    - name: Wait for healthchecks to pass
      ansible.builtin.shell: |
        cd "{{ app_dir }}"
        
        check_with_jq() {
          local JSON=$({{ docker_compose_cmd }} ps --format json 2>/dev/null)
          TOTAL=$(echo "$JSON" | jq -rs '[.[] | select(.Health != null and .Health != "")] | length' 2>/dev/null) || return 1
          HEALTHY=$(echo "$JSON" | jq -rs '[.[] | select(.Health == "healthy")] | length' 2>/dev/null) || return 1
          UNHEALTHY=$(echo "$JSON" | jq -rs '[.[] | select(.Health == "unhealthy")] | length' 2>/dev/null) || return 1
          return 0
        }
        
        check_with_grep() {
          local PS_OUTPUT=$({{ docker_compose_cmd }} ps 2>/dev/null)
          TOTAL=$(echo "$PS_OUTPUT" | grep -cE '\(healthy\)|\(unhealthy\)|\(starting\)' || echo "0")
          HEALTHY=$(echo "$PS_OUTPUT" | grep -c '(healthy)' || echo "0")
          UNHEALTHY=$(echo "$PS_OUTPUT" | grep -c '(unhealthy)' || echo "0")
        }
        
        if command -v jq &>/dev/null && check_with_jq; then
          :
        else
          check_with_grep
        fi
        
        echo "healthy=$HEALTHY total=$TOTAL unhealthy=$UNHEALTHY"
        
        if [[ "$UNHEALTHY" -gt 0 ]]; then
          exit 2
        elif [[ "$TOTAL" -gt 0 && "$HEALTHY" -eq "$TOTAL" ]]; then
          exit 0
        else
          exit 1
        fi
      args:
        executable: /bin/bash
      register: health_status
      until: health_status.rc == 0
      retries: "{{ ((health_check_timeout | default(60)) | int / (health_check_interval | default(5)) | int) | int }}"
      delay: "{{ health_check_interval | default(5) }}"
      failed_when: health_status.rc == 2
      changed_when: false
      when: healthcheck_services | int > 0

    - name: Check for exited containers
      ansible.builtin.shell: |
        cd "{{ app_dir }}"
        if command -v jq &>/dev/null; then
          RESULT=$({{ docker_compose_cmd }} ps --format json 2>/dev/null | \
            jq -rs '[.[] | select(.State == "exited" or .State == "dead")] | .[].Service' 2>/dev/null)
          if [[ $? -eq 0 ]]; then
            echo "$RESULT"
            exit 0
          fi
        fi
        {{ docker_compose_cmd }} ps 2>/dev/null | grep -E "Exited|Dead" | awk '{print $1}' || true
      args:
        executable: /bin/bash
      register: exited_containers
      changed_when: false

    - name: Set health check result
      ansible.builtin.set_fact:
        health_check_passed: "{{ exited_containers.stdout | length == 0 }}"
        failed_containers: "{{ exited_containers.stdout_lines | default([]) }}"

    - name: Fail if containers exited
      ansible.builtin.fail:
        msg: "Container(s) exited unexpectedly: {{ exited_containers.stdout_lines | join(', ') }}"
      when:
        - fail_on_unhealthy | default(true) | bool
        - exited_containers.stdout | length > 0
