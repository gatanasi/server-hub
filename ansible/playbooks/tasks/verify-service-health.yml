---
# verify-service-health.yml - Reusable health check verification for Docker services
#
# This task file verifies that Docker Compose services are healthy after operations
# like deploy, backup, or restore. It leverages Docker's native healthcheck feature
# defined in docker-compose.yml files.
#
# Docker Healthcheck Integration:
#   Services should define healthchecks in their docker-compose.yml:
#     healthcheck:
#       test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
#       interval: 30s
#       timeout: 10s
#       retries: 3
#       start_period: 40s  # Grace period before checks count as failures
#
#   The calling playbook should set health_check_timeout >= max(start_period) + buffer
#   to allow services enough time to become healthy.
#
# Required variables:
#   - app_dir: Path to the docker-compose.yml directory
#   - docker_compose_cmd: Docker compose command (e.g., "docker compose")
#
# Optional variables:
#   - health_check_timeout: Total timeout in seconds (default: 60)
#                           Should be >= max(start_period) + 30s buffer
#   - health_check_interval: Interval between checks in seconds (default: 5)
#   - skip_health_check: Skip health verification (default: false)
#   - fail_on_unhealthy: Fail playbook if unhealthy (default: true)
#
# Sets facts:
#   - healthcheck_services_count: Number of services with healthchecks
#   - health_check_passed: Boolean indicating if health check passed
#   - no_healthchecks_defined: Boolean if no healthchecks are defined
#

- name: Skip health check if requested
  ansible.builtin.set_fact:
    health_check_passed: true
    healthcheck_services_count: 0
    no_healthchecks_defined: true
  when: skip_health_check | default(false) | bool

- name: Verify service health
  when: not (skip_health_check | default(false) | bool)
  block:
    - name: Get initial Docker Compose service state
      ansible.builtin.command:
        cmd: "{{ docker_compose_cmd }} ps --format json"
        chdir: "{{ app_dir }}"
      register: initial_compose_ps
      changed_when: false

    - name: Parse service healthcheck configuration
      ansible.builtin.set_fact:
        # Filter services that have a truthy Health status (excludes missing, null, empty)
        services_with_healthchecks: >-
          {{
            initial_compose_ps.stdout | from_json |
            selectattr('Health') |
            list
          }}

    - name: Set healthcheck counts
      ansible.builtin.set_fact:
        healthcheck_services_count: "{{ services_with_healthchecks | length }}"
        no_healthchecks_defined: "{{ (services_with_healthchecks | length) == 0 }}"

    - name: Display healthcheck info
      ansible.builtin.debug:
        msg: >-
          {{
            'No services with healthchecks found - skipping health verification'
            if no_healthchecks_defined
            else 'Found ' + (healthcheck_services_count | string) + ' service(s) with healthchecks'
          }}

    - name: Verify health and exited status
      block:
        - name: Wait for services to become healthy
          ansible.builtin.command:
            cmd: "{{ docker_compose_cmd }} ps --format json"
            chdir: "{{ app_dir }}"
          register: health_wait_result
          until: >-
            (
              health_wait_result.stdout | from_json |
              selectattr('Health', 'defined') |
              selectattr('Health', 'equalto', 'healthy') |
              list | length
            ) == (healthcheck_services_count | int)
          retries: "{{ [((health_check_timeout | default(60) | int) / (health_check_interval | default(5) | int)) | int, 1] | max }}"
          delay: "{{ health_check_interval | default(5) | int }}"
          changed_when: false
          when: healthcheck_services_count | int > 0

      rescue:
        - name: Inspect failed services
          ansible.builtin.command:
            cmd: "{{ docker_compose_cmd }} ps --format json"
            chdir: "{{ app_dir }}"
          register: failure_inspection
          changed_when: false

        - name: Determine failure reason and fail
          ansible.builtin.fail:
            msg: >-
              {% set services = failure_inspection.stdout | from_json %}
              {% set unhealthy = services | selectattr('Health', 'defined') | selectattr('Health', 'equalto', 'unhealthy') | list %}
              {% if unhealthy | length > 0 %}
              One or more services reported an "unhealthy" status: {{ unhealthy | map(attribute='Service') | join(', ') }}.
              {% else %}
              Health checks timed out after {{ health_check_timeout | default(60) }} seconds.
              Services may still be starting. Unhealthy/Starting services: {{ services | selectattr('Health', 'defined') | selectattr('Health', 'ne', 'healthy') | map(attribute='Service') | join(', ') }}
              {% endif %}

    - name: Identify exited containers
      ansible.builtin.set_fact:
        exited_containers_list: >-
          {{
            (health_wait_result.stdout if health_wait_result is defined and health_wait_result.skipped is not defined else initial_compose_ps.stdout) | from_json |
            selectattr('State', 'in', ['exited', 'dead']) |
            map(attribute='Service') |
            list
          }}

    - name: Fail if containers exited
      ansible.builtin.fail:
        msg: "Container(s) exited unexpectedly: {{ exited_containers_list | join(', ') }}"
      when:
        - fail_on_unhealthy | default(true) | bool
        - exited_containers_list | length > 0

    - name: Set final health check status
      ansible.builtin.set_fact:
        health_check_passed: "{{ exited_containers_list | length == 0 }}"
