[defaults]
# Inventory file location
inventory = inventory/production.yml

# Disable host key checking for initial setup (consider enabling in production)
# host_key_checking = False

# Use the YAML callback plugin for nicer output
# stdout_callback = yaml

# Reduce SSH connection overhead
forks = 10
pipelining = True

# Timeout settings
timeout = 30
gather_timeout = 30

# Retry settings for unreliable networks
retries = 3

# Don't create .retry files
retry_files_enabled = False

# Log output
log_path = /var/log/ansible/ansible.log

# Roles path
roles_path = roles

# Disable deprecation warnings in output
deprecation_warnings = False

# Interpreter discovery
interpreter_python = auto_silent

[ssh_connection]
# SSH arguments for performance and reliability
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=accept-new

# Prefer sftp over scp for file transfers
transfer_method = sftp

[privilege_escalation]
# We don't need sudo for docker commands (users are in docker group)
become = False
