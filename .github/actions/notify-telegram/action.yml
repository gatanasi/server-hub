# Composite Action: Send Telegram Notification
#
# This action sends a notification to Telegram using the Bot API.
# It handles conditional sending (only if token/chat_id are provided)
# and formats messages with HTML.
#
# Usage:
#   - name: Send Telegram notification
#     uses: ./.github/actions/notify-telegram
#     with:
#       bot-token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
#       chat-id: ${{ secrets.TELEGRAM_CHAT_ID }}
#       status: 'success'  # or 'failure'
#       emoji: '✅'
#       title: 'Deployment Successful'
#       message: 'App: myapp\nBranch: main'
#       run-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
#

name: 'Send Telegram Notification'
description: 'Send a notification message to Telegram'

inputs:
  bot-token:
    description: 'Telegram bot token'
    required: false
    default: ''
  chat-id:
    description: 'Telegram chat ID'
    required: false
    default: ''
  status:
    description: 'Status of the operation (success/failure/warning)'
    required: false
    default: 'success'
  emoji:
    description: 'Emoji to prefix the title'
    required: false
    default: '✅'
  title:
    description: 'Notification title'
    required: true
  message:
    description: 'Notification message body (supports %0A for newlines)'
    required: true
  run-url:
    description: 'URL to the GitHub Actions run (optional)'
    required: false
    default: ''
  include-run-link:
    description: 'Whether to include the run URL link in the message'
    required: false
    default: 'true'

runs:
  using: 'composite'
  steps:
    - name: Send Telegram notification
      shell: bash
      run: |
        # Only send if both token and chat_id are provided
        if [[ -z "${{ inputs.bot-token }}" || -z "${{ inputs.chat-id }}" ]]; then
          echo "Telegram credentials not configured, skipping notification"
          exit 0
        fi
        
        # Build the message
        EMOJI="${{ inputs.emoji }}"
        TITLE="${{ inputs.title }}"
        MESSAGE="${{ inputs.message }}"
        RUN_URL="${{ inputs.run-url }}"
        INCLUDE_LINK="${{ inputs.include-run-link }}"
        
        # Construct the full message
        FULL_MESSAGE="${EMOJI} <b>${TITLE}</b>%0A%0A${MESSAGE}"
        
        # Append run URL if provided and requested
        if [[ -n "$RUN_URL" && "$INCLUDE_LINK" == "true" ]]; then
          FULL_MESSAGE="${FULL_MESSAGE}%0A%0A<a href=\"${RUN_URL}\">View Run</a>"
        fi
        
        # Send the notification
        curl -s -X POST "https://api.telegram.org/bot${{ inputs.bot-token }}/sendMessage" \
          -d "chat_id=${{ inputs.chat-id }}" \
          -d "text=${FULL_MESSAGE}" \
          -d "parse_mode=HTML" || true
