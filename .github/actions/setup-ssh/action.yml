# JavaScript Action: Setup SSH for Deployer VM
#
# This action sets up SSH configuration for connecting to the deployer VM.
# It creates the ~/.ssh directory, configures known_hosts, and writes the
# private key with proper permissions.
#
# Security Model:
# - The SSH key is scoped to deployer.vm with a forced command
# - The runner cannot get a shell on deployer.vm
# - Key is cleaned up automatically after the job completes via post.js
#
# Usage:
#   - name: Setup SSH
#     uses: ./.github/actions/setup-ssh
#     with:
#       ssh-private-key: ${{ secrets.DEPLOYER_SSH_KEY }}
#       ssh-known-hosts: ${{ secrets.DEPLOYER_SSH_KNOWN_HOSTS }}
#

name: 'Setup SSH'
description: 'Configure SSH for deployer.vm access with forced command security model'

inputs:
  ssh-private-key:
    description: 'Private SSH key for github-runner -> deployer.vm'
    required: true
  ssh-known-hosts:
    description: 'SSH known_hosts entry for deployer.vm'
    required: true

outputs:
  ssh-key-path:
    description: 'Path to the action-managed temporary SSH private key'

runs:
  using: 'node24'
  main: 'main.js'
  post: 'post.js'
