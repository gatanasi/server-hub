name: 'Setup SSH'
description: 'Configure SSH for deployer.vm access with forced command security model'

inputs:
  ssh-private-key:
    description: 'Private SSH key for github-runner -> deployer.vm'
    required: true
  ssh-known-hosts:
    description: 'SSH known_hosts entry for deployer.vm'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Create SSH directory
      shell: bash
      run: |
        mkdir -p ~/.ssh
        chmod 700 ~/.ssh

    - name: Configure SSH known_hosts
      shell: bash
      env:
        SSH_KNOWN_HOSTS: ${{ inputs.ssh-known-hosts }}
      run: |
        echo "${SSH_KNOWN_HOSTS}" >> ~/.ssh/known_hosts
        chmod 644 ~/.ssh/known_hosts

    - name: Write SSH private key
      shell: bash
      env:
        SSH_PRIVATE_KEY: ${{ inputs.ssh-private-key }}
      run: |
        echo "${SSH_PRIVATE_KEY}" > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key

    - name: Cleanup SSH key
      uses: gacts/run-and-post-run@v1
      with:
        post: |
          rm -f ~/.ssh/deploy_key ~/.ssh/known_hosts
