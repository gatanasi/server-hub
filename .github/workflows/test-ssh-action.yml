name: Test SSH Action
on:
  pull_request:
    paths:
      - .github/actions/setup-ssh/**
      - .github/workflows/test-ssh-action.yml
  push:
    branches:
      - main
    paths:
      - .github/actions/setup-ssh/**
      - .github/workflows/test-ssh-action.yml
  workflow_dispatch:
jobs:
  test:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup SSH
        uses: ./.github/actions/setup-ssh
        with:
          ssh-private-key: fake-test-private-key-content
          ssh-known-hosts: |
            github.com ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAItestKnownHostsKeyMaterial
      - name: Verify SSH files were created securely
        run: |
          get_mode() {
            if stat -c '%a' "$1" >/dev/null 2>&1; then
              stat -c '%a' "$1"
            else
              stat -f '%A' "$1"
            fi
          }

          test -f ~/.ssh/deploy_key
          test -f ~/.ssh/known_hosts

          test "$(get_mode ~/.ssh)" = "700"
          test "$(get_mode ~/.ssh/deploy_key)" = "600"
          test "$(get_mode ~/.ssh/known_hosts)" = "644"

          grep -q 'BEGIN managed by setup-ssh action' ~/.ssh/known_hosts
          grep -q 'END managed by setup-ssh action' ~/.ssh/known_hosts

      - name: Simulate downstream failure
        continue-on-error: true
        run: |
          echo "Simulating failure to exercise cleanup behavior"
          exit 1

      - name: Setup Node.js for cleanup verification
        if: always()
        uses: actions/setup-node@60edb5dd545a775178f52524783378180af0d1f8 # v4.0.2
        with:
          node-version: '24'

      - name: Verify cleanup script behavior
        if: always()
        run: |
          node .github/actions/setup-ssh/post.js

          if [ -f ~/.ssh/deploy_key ]; then
            echo "deploy_key should be removed by cleanup"
            exit 1
          fi

          if [ -f ~/.ssh/known_hosts ] && grep -q 'BEGIN managed by setup-ssh action' ~/.ssh/known_hosts; then
            echo "Action-managed known_hosts entries should be removed"
            exit 1
          fi

      - name: Prepare pre-existing known_hosts
        if: always()
        run: |
          mkdir -p ~/.ssh
          cat <<'EOF' > ~/.ssh/known_hosts
          # existing known_hosts content

          EOF

      - name: Setup SSH with pre-existing known_hosts
        if: always()
        uses: ./.github/actions/setup-ssh
        with:
          ssh-private-key: fake-test-private-key-content
          ssh-known-hosts: |
            github.com ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAItestKnownHostsKeyMaterial

      - name: Verify managed entries were appended to pre-existing known_hosts
        if: always()
        run: |
          test -f ~/.ssh/deploy_key
          test -f ~/.ssh/known_hosts
          grep -q '^# existing known_hosts content$' ~/.ssh/known_hosts
          grep -q 'BEGIN managed by setup-ssh action' ~/.ssh/known_hosts
          grep -q 'END managed by setup-ssh action' ~/.ssh/known_hosts

      - name: Verify cleanup preserves pre-existing known_hosts content
        if: always()
        run: |
          STATE_KNOWN_HOSTS_EXISTED_BEFORE=1 node .github/actions/setup-ssh/post.js

          if [ -f ~/.ssh/deploy_key ]; then
            echo "deploy_key should be removed by cleanup"
            exit 1
          fi

          if [ ! -f ~/.ssh/known_hosts ]; then
            echo "known_hosts should be preserved when it existed before the action"
            exit 1
          fi

          if grep -q 'BEGIN managed by setup-ssh action' ~/.ssh/known_hosts; then
            echo "Action-managed known_hosts entries should be removed from pre-existing file"
            exit 1
          fi

          if ! grep -q '^# existing known_hosts content$' ~/.ssh/known_hosts; then
            echo "Pre-existing known_hosts content should be preserved"
            exit 1
          fi
