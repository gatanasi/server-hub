# GitHub Actions Workflow: Restore Docker Volumes
#
# This workflow allows manual triggering of Docker volume restores for specific services.
# It runs on a self-hosted runner and triggers the restore playbook via SSH to the deployer VM.
#
# ⚠️ WARNING: This will OVERWRITE existing data! Use with caution.
#
# Security Model:
# - The runner only has SSH access to deployer.vm
# - All restore logic and credentials live on deployer.vm
#
# Required Secrets:
# - DEPLOYER_SSH_KEY: Private SSH key for github-runner -> deployer.vm
# - DEPLOYER_HOST: Hostname or IP of deployer.vm
# - DEPLOYER_USER: Username on deployer.vm (usually 'deployer')
# - DEPLOYER_SSH_KNOWN_HOSTS: SSH known_hosts entry for deployer.vm
#
# Optional Secrets:
# - TELEGRAM_BOT_TOKEN: Telegram bot token for notifications
# - TELEGRAM_CHAT_ID: Telegram chat ID for notifications
#

name: Restore Docker Volumes

on:
  # Manual trigger only
  workflow_dispatch:
    inputs:
      app_name:
        description: 'Application to restore (e.g., n8n, odoo, caddy)'
        required: true
        type: choice
        options:
          - n8n
          - odoo
          - caddy
          - wg-easy
          - stirling-pdf
          - convertx
          - video-converter
          - openspeedtest
      operation:
        description: 'Operation to perform'
        required: true
        type: choice
        options:
          - list_backups
          - restore_latest
          - restore_specific
        default: 'list_backups'
      backup_timestamp:
        description: 'Backup timestamp to restore (only for restore_specific, e.g., 20260106T143000)'
        required: false
        type: string
        default: ''
      backup_source:
        description: 'Backup source path (default: /mnt/backups)'
        required: false
        type: string
        default: '/mnt/backups'

# Prevent concurrent restores
concurrency:
  group: restore-${{ github.event.inputs.app_name }}
  cancel-in-progress: false

jobs:
  restore:
    name: ${{ github.event.inputs.operation }} - ${{ github.event.inputs.app_name }}
    runs-on: self-hosted
    
    steps:
      - name: Validate inputs
        run: |
          APP="${{ github.event.inputs.app_name }}"
          OP="${{ github.event.inputs.operation }}"
          TIMESTAMP="${{ github.event.inputs.backup_timestamp }}"
          BACKUP_SRC="${{ github.event.inputs.backup_source }}"
          
          # Validate app name
          if [[ ! "$APP" =~ ^[a-zA-Z0-9_-]+$ ]]; then
            echo "::error::Invalid app name: $APP"
            exit 1
          fi
          
          # Validate backup source path (must be absolute, no path traversal)
          if [[ ! "$BACKUP_SRC" =~ ^/[a-zA-Z0-9/_.-]+$ ]]; then
            echo "::error::Invalid backup_source path: $BACKUP_SRC. Must be an absolute path without special characters."
            exit 1
          fi
          # Explicitly forbid '..' as a path component to prevent directory traversal
          if [[ "$BACKUP_SRC" =~ (^|/)\.\./|/\.\.$|(^|/)\.\. ]]; then
            echo "::error::backup_source cannot contain path traversal components ('..')"
            exit 1
          fi
          
          # Validate timestamp format for restore_specific
          if [[ "$OP" == "restore_specific" ]]; then
            if [[ -z "$TIMESTAMP" ]]; then
              echo "::error::backup_timestamp is required for restore_specific operation"
              exit 1
            fi
            if [[ ! "$TIMESTAMP" =~ ^[0-9]{8}T[0-9]{6}$ ]]; then
              echo "::error::Invalid backup_timestamp format: $TIMESTAMP. Expected format: YYYYMMDDTHHMMSS (e.g., 20260106T143000)"
              exit 1
            fi
          fi
          
          echo "Operation: $OP for $APP"

      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Setup SSH
        uses: ./.github/actions/setup-ssh
        with:
          ssh-private-key: ${{ secrets.DEPLOYER_SSH_KEY }}
          ssh-known-hosts: ${{ secrets.DEPLOYER_SSH_KNOWN_HOSTS }}

      - name: Run restore via deployer.vm
        id: restore
        run: |
          echo "::group::Running restore on deployer.vm"
          
          APP_NAME="${{ github.event.inputs.app_name }}"
          OPERATION="${{ github.event.inputs.operation }}"
          TIMESTAMP="${{ github.event.inputs.backup_timestamp }}"
          BACKUP_SRC="${{ github.event.inputs.backup_source }}"
          
          # Build the restore command
          # Format: restore <app> <operation> [--source path] [--timestamp TIMESTAMP]
          RESTORE_CMD="restore ${APP_NAME} ${OPERATION} --source ${BACKUP_SRC}"
          
          if [[ "$OPERATION" == "restore_specific" && -n "$TIMESTAMP" ]]; then
            RESTORE_CMD="${RESTORE_CMD} --timestamp ${TIMESTAMP}"
          fi
          
          # SSH to deployer.vm - capture output for error reporting
          OUTPUT_FILE=$(mktemp)
          RESTORE_EXIT=0
          ssh -i ~/.ssh/deploy_key \
              -o BatchMode=yes \
              -o ConnectTimeout=30 \
              -o StrictHostKeyChecking=yes \
              "${{ secrets.DEPLOYER_USER }}@${{ secrets.DEPLOYER_HOST }}" \
              "${RESTORE_CMD}" 2>&1 | tee "$OUTPUT_FILE" || RESTORE_EXIT=$?
          
          echo "::endgroup::"
          
          # Extract available backups for list operation
          if [[ "$OPERATION" == "list_backups" ]]; then
            BACKUPS=$(grep -A 20 "Available backups" "$OUTPUT_FILE" | head -20 || true)
            echo "backups<<EOF" >> $GITHUB_OUTPUT
            echo "$BACKUPS" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi
          
          if [[ $RESTORE_EXIT -eq 0 ]]; then
            echo "✅ Operation successful"
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "::error::Operation failed"
            echo "status=failed" >> $GITHUB_OUTPUT
            
            # Extract error details from output for notification
            ERROR_DETAILS=""
            
            # Extract failed hosts and their error messages
            FAILED_HOSTS=$(grep -E "^fatal:|FAILED!" "$OUTPUT_FILE" | head -5 || true)
            if [[ -n "$FAILED_HOSTS" ]]; then
              ERROR_DETAILS="$FAILED_HOSTS"
            fi
            
            # Check for common error patterns
            if grep -q "No backups found\|not found\|does not exist" "$OUTPUT_FILE"; then
              NOT_FOUND=$(grep -E "No backups found|not found|does not exist" "$OUTPUT_FILE" | head -3 || true)
              ERROR_DETAILS="${ERROR_DETAILS}${NOT_FOUND}"
            fi
            
            # Truncate if too long
            if [[ ${#ERROR_DETAILS} -gt 500 ]]; then
              ERROR_DETAILS="${ERROR_DETAILS:0:500}..."
            fi
            
            echo "error_details<<EOF" >> $GITHUB_OUTPUT
            echo "$ERROR_DETAILS" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            
            rm -f "$OUTPUT_FILE"
            exit $RESTORE_EXIT
          fi
          
          rm -f "$OUTPUT_FILE"

      - name: Cleanup SSH keys
        if: always()
        run: |
          rm -f ~/.ssh/deploy_key

      - name: Determine notification parameters
        if: always() && (github.event.inputs.operation != 'list_backups' || job.status == 'failure')
        id: notify-params
        run: |
          OP="${{ github.event.inputs.operation }}"
          TIMESTAMP="${{ github.event.inputs.backup_timestamp }}"
          
          if [[ "${{ job.status }}" == "success" ]]; then
            echo "emoji=🔄" >> $GITHUB_OUTPUT
            echo "title=Restore Completed" >> $GITHUB_OUTPUT
            if [[ "$OP" == "restore_latest" ]]; then
              echo "details=<b>Restored:</b> latest backup" >> $GITHUB_OUTPUT
            else
              echo "details=<b>Restored:</b> backup ${TIMESTAMP}" >> $GITHUB_OUTPUT
            fi
            echo "error_summary=" >> $GITHUB_OUTPUT
          else
            echo "emoji=❌" >> $GITHUB_OUTPUT
            echo "title=Restore Failed" >> $GITHUB_OUTPUT
            echo "details=<b>Operation:</b> ${OP}" >> $GITHUB_OUTPUT
            # Include error details if available
            ERROR_DETAILS='${{ steps.restore.outputs.error_details }}'
            if [[ -n "$ERROR_DETAILS" ]]; then
              ERROR_SUMMARY=$(echo "$ERROR_DETAILS" | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g' | tr '\n' ' ' | sed 's/  */ /g')
              echo "error_summary=<b>Error:</b> <pre>${ERROR_SUMMARY}</pre>" >> $GITHUB_OUTPUT
            else
              echo "error_summary=<b>Error:</b> Check workflow logs for details" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Send Telegram notification
        if: always() && (github.event.inputs.operation != 'list_backups' || job.status == 'failure')
        uses: ./.github/actions/notify-telegram
        with:
          bot-token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          chat-id: ${{ secrets.TELEGRAM_CHAT_ID }}
          emoji: ${{ steps.notify-params.outputs.emoji }}
          title: ${{ steps.notify-params.outputs.title }}
          message: "<b>App:</b> <code>${{ github.event.inputs.app_name }}</code>%0A${{ steps.notify-params.outputs.details }}%0A<b>Triggered by:</b> ${{ github.actor }}${{ steps.notify-params.outputs.error_summary != '' && format('%0A%0A{0}', steps.notify-params.outputs.error_summary) || '' }}"
          run-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
