# GitHub Actions Workflow: Backup Docker Volumes
#
# This workflow allows manual triggering of Docker volume backups for specific services.
# It runs on a self-hosted runner and triggers the backup playbook via SSH to the deployer VM.
#
# Security Model:
# - The runner only has SSH access to deployer.vm
# - All backup logic and credentials live on deployer.vm
#
# Required Secrets:
# - DEPLOYER_SSH_KEY: Private SSH key for github-runner -> deployer.vm
# - DEPLOYER_HOST: Hostname or IP of deployer.vm
# - DEPLOYER_USER: Username on deployer.vm (usually 'deployer')
# - DEPLOYER_SSH_KNOWN_HOSTS: SSH known_hosts entry for deployer.vm
#
# Optional Secrets:
# - TELEGRAM_BOT_TOKEN: Telegram bot token for notifications
# - TELEGRAM_CHAT_ID: Telegram chat ID for notifications
#

name: Backup Docker Volumes

on:
  # Manual trigger only
  workflow_dispatch:
    inputs:
      app_name:
        description: 'Application to backup (e.g., n8n, odoo, caddy)'
        required: true
        type: choice
        options:
          - n8n
          - odoo
          - caddy
          - wg-easy
          - stirling-pdf
          - convertx
          - video-converter
          - openspeedtest
          - all
      target_host:
        description: 'Target host (leave empty for all hosts with the app)'
        required: false
        type: string
        default: ''
      backup_destination:
        description: 'Backup destination path (default: /mnt/backups)'
        required: false
        type: string
        default: '/mnt/backups'

# Prevent concurrent backups
concurrency:
  group: backup-${{ github.event.inputs.app_name }}
  cancel-in-progress: false

jobs:
  backup:
    name: Backup ${{ github.event.inputs.app_name }}
    runs-on: self-hosted
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Validate inputs
        run: |
          APP="${{ github.event.inputs.app_name }}"
          BACKUP_DEST="${{ github.event.inputs.backup_destination }}"
          TARGET_HOST="${{ github.event.inputs.target_host }}"
          
          # Validate app name
          if [[ ! "$APP" =~ ^[a-zA-Z0-9_-]+$ ]]; then
            echo "::error::Invalid app name: $APP"
            exit 1
          fi
          
          # Validate backup destination path (must be absolute, no path traversal)
          if [[ ! "$BACKUP_DEST" =~ ^/[a-zA-Z0-9/_.-]+$ ]]; then
            echo "::error::Invalid backup_destination path: $BACKUP_DEST. Must be an absolute path without special characters."
            exit 1
          fi
          # Explicitly forbid '..' as a path component to prevent directory traversal
          if [[ "$BACKUP_DEST" =~ (^|/)\.\./|/\.\.$|(^|/)\.\. ]]; then
            echo "::error::backup_destination cannot contain path traversal components ('..')"
            exit 1
          fi
          
          # Validate target host if provided
          if [[ -n "$TARGET_HOST" && ! "$TARGET_HOST" =~ ^[a-zA-Z0-9._-]+$ ]]; then
            echo "::error::Invalid target_host: $TARGET_HOST"
            exit 1
          fi
          
          echo "Starting backup for: $APP"

      - name: Setup SSH
        uses: ./.github/actions/setup-ssh
        with:
          ssh-private-key: ${{ secrets.DEPLOYER_SSH_KEY }}
          ssh-known-hosts: ${{ secrets.DEPLOYER_SSH_KNOWN_HOSTS }}

      - name: Run backup via deployer.vm
        id: backup
        run: |
          echo "::group::Running backup on deployer.vm"
          
          APP_NAME="${{ github.event.inputs.app_name }}"
          TARGET_HOST="${{ github.event.inputs.target_host }}"
          BACKUP_DEST="${{ github.event.inputs.backup_destination }}"
          
          # Build the backup command
          # Format: backup <app> [--destination path] [--host hostname]
          BACKUP_CMD="backup ${APP_NAME} --destination ${BACKUP_DEST}"
          
          if [[ -n "$TARGET_HOST" ]]; then
            BACKUP_CMD="${BACKUP_CMD} --host ${TARGET_HOST}"
          fi
          
          # SSH to deployer.vm - capture output for error reporting
          # Use a temporary file to capture both stdout and stderr while preserving exit code
          OUTPUT_FILE=$(mktemp)
          BACKUP_EXIT=0
          ssh -i ~/.ssh/deploy_key \
              -o BatchMode=yes \
              -o ConnectTimeout=30 \
              -o StrictHostKeyChecking=yes \
              "${{ secrets.DEPLOYER_USER }}@${{ secrets.DEPLOYER_HOST }}" \
              "${BACKUP_CMD}" 2>&1 | tee "$OUTPUT_FILE" || BACKUP_EXIT=$?
          
          echo "::endgroup::"
          
          if [[ $BACKUP_EXIT -eq 0 ]]; then
            echo "✅ Backup successful for ${{ github.event.inputs.app_name }}"
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "::error::Backup failed for ${{ github.event.inputs.app_name }}"
            echo "status=failed" >> $GITHUB_OUTPUT
            
            # Extract error details from Ansible output for notification
            # Look for FAILED tasks or error messages
            ERROR_DETAILS=""
            
            # Extract failed hosts and their error messages
            FAILED_HOSTS=$(grep -E "^fatal:|FAILED!" "$OUTPUT_FILE" | head -5 || true)
            if [[ -n "$FAILED_HOSTS" ]]; then
              ERROR_DETAILS="$FAILED_HOSTS"
            fi
            
            # Also check for common error patterns
            if grep -q "does not exist" "$OUTPUT_FILE"; then
              MOUNT_ERROR=$(grep -A 2 "does not exist" "$OUTPUT_FILE" | head -3 || true)
              if [[ -n "$ERROR_DETAILS" ]]; then
                ERROR_DETAILS="${ERROR_DETAILS}"$'\n'"${MOUNT_ERROR}"
              else
                ERROR_DETAILS="${MOUNT_ERROR}"
              fi
            fi
            
            # Truncate if too long (Telegram has message limits)
            if [[ ${#ERROR_DETAILS} -gt 500 ]]; then
              ERROR_DETAILS="${ERROR_DETAILS:0:500}..."
            fi
            
            # Store error details for notification step
            # Use delimiter to handle multiline
            echo "error_details<<EOF" >> $GITHUB_OUTPUT
            echo "$ERROR_DETAILS" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            
            rm -f "$OUTPUT_FILE"
            exit $BACKUP_EXIT
          fi
          
          rm -f "$OUTPUT_FILE"

      - name: Cleanup SSH keys
        if: always()
        run: |
          rm -f ~/.ssh/deploy_key

      - name: Determine notification parameters
        if: always()
        id: notify-params
        run: |
          TARGET="${{ github.event.inputs.target_host }}"
          if [[ -z "$TARGET" ]]; then
            TARGET="all hosts"
          fi
          
          if [[ "${{ job.status }}" == "success" ]]; then
            echo "emoji=💾" >> $GITHUB_OUTPUT
            echo "title=Backup Completed" >> $GITHUB_OUTPUT
            echo "error_summary=" >> $GITHUB_OUTPUT
          else
            echo "emoji=❌" >> $GITHUB_OUTPUT
            echo "title=Backup Failed" >> $GITHUB_OUTPUT
            # Include error details if available
            ERROR_DETAILS='${{ steps.backup.outputs.error_details }}'
            if [[ -n "$ERROR_DETAILS" ]]; then
              # Escape for Telegram HTML and use %0A for newlines
              ERROR_SUMMARY=$(echo "$ERROR_DETAILS" | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g' | tr '\n' ' ' | sed 's/  */ /g')
              echo "error_summary=<b>Error:</b> <pre>${ERROR_SUMMARY}</pre>" >> $GITHUB_OUTPUT
            else
              echo "error_summary=<b>Error:</b> Check workflow logs for details" >> $GITHUB_OUTPUT
            fi
          fi
          
          echo "target=$TARGET" >> $GITHUB_OUTPUT

      - name: Send Telegram notification
        if: always()
        uses: ./.github/actions/notify-telegram
        with:
          bot-token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          chat-id: ${{ secrets.TELEGRAM_CHAT_ID }}
          emoji: ${{ steps.notify-params.outputs.emoji }}
          title: ${{ steps.notify-params.outputs.title }}
          message: "App: <code>${{ github.event.inputs.app_name }}</code>%0ATarget: <code>${{ steps.notify-params.outputs.target }}</code>%0ADestination: <code>${{ github.event.inputs.backup_destination }}</code>%0ATriggered by: ${{ github.actor }}${{ steps.notify-params.outputs.error_summary != '' && format('%0A%0A{0}', steps.notify-params.outputs.error_summary) || '' }}"
          run-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
