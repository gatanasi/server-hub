name: Homelab Deployment

on:
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy ${{ matrix.service }}
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: "caddy"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Check for changes
        id: filter
        uses: dorny/paths-filter@7267a8516b6f92bdb098633497bad573efdbf271 # v2.12.0
        with:
          filters: |
            src:
              - 'docker/${{ matrix.service }}/**'

      - name: Install SSH Key
        if: steps.filter.outputs.src == 'true' || github.event_name == 'workflow_dispatch'
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: "unnecessary_placeholder" 
          if_key_exists: replace

      - name: Deploy to Target VM
        if: steps.filter.outputs.src == 'true' || github.event_name == 'workflow_dispatch'
        env:
          TARGET_USER: ${{ secrets.SSH_DEPLOY_USER }}
        run: |
          # ---------------------------------------------------------
          # 1. Determine Hostname (Default: service.vm)
          # ---------------------------------------------------------
          TARGET_HOST="${{ matrix.hostname }}"
          if [ -z "$TARGET_HOST" ]; then
            TARGET_HOST="${{ matrix.service }}.vm"
          fi
          
          # ---------------------------------------------------------
          # 2. Determine Deploy Path (Default: /opt/service)
          # ---------------------------------------------------------
          DEPLOY_PATH="${{ matrix.deploy_path }}"
          if [ -z "$DEPLOY_PATH" ]; then
            DEPLOY_PATH="/opt/${{ matrix.service }}"
          fi

          echo "🚀 Deploying ${{ matrix.service }} to $TARGET_HOST at $DEPLOY_PATH..."

          SSH_OPTS="-o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=/dev/null"
          
          # 3. Create remote directory 
          ssh $SSH_OPTS $TARGET_USER@$TARGET_HOST "mkdir -p $DEPLOY_PATH"
          
          # 4. Secure Copy (SCP)
          scp $SSH_OPTS -r ./docker/${{ matrix.service }}/* $TARGET_USER@$TARGET_HOST:$DEPLOY_PATH/
          
          # 5. Docker Compose
          ssh $SSH_OPTS $TARGET_USER@$TARGET_HOST "cd $DEPLOY_PATH && docker compose down --remove-orphans && docker compose up -d --force-recreate --pull always"

          echo "✅ Deployment complete for ${{ matrix.service }}"
