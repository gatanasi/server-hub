# GitHub Actions Workflow: Deploy Docker Compose Applications
#
# This workflow triggers on changes to any docker-compose.yml file in the docker/ directory.
# It runs on a self-hosted runner and triggers deployment via SSH to the deployer VM.
#
# Security Model:
# - The runner only has SSH access to deployer.vm with a forced command
# - The runner cannot get a shell on deployer.vm
# - All deployment logic and credentials live on deployer.vm
#
# Required Secrets:
# - DEPLOYER_SSH_KEY: Private SSH key for github-runner -> deployer.vm
# - DEPLOYER_HOST: Hostname or IP of deployer.vm
# - DEPLOYER_USER: Username on deployer.vm (usually 'deployer')
# - DEPLOYER_SSH_KNOWN_HOSTS: SSH known_hosts entry for deployer.vm
#
# Optional Secrets:
# - TELEGRAM_BOT_TOKEN: Telegram bot token for notifications
# - TELEGRAM_CHAT_ID: Telegram chat ID for notifications
#

name: Deploy Docker Apps

on:
  push:
    branches:
      - main
    paths:
      - 'docker/**/docker-compose.yml'
      - 'docker/**/docker-compose.yaml'
      - 'docker/**/.env.enc'

  # Allow manual trigger with app name selection
  workflow_dispatch:
    inputs:
      app_name:
        description: 'Application to deploy (folder name in docker/)'
        required: true
        type: string

# Prevent concurrent deployments
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  detect-changes:
    name: Detect Changed Apps
    runs-on: self-hosted
    outputs:
      apps: ${{ steps.detect.outputs.apps }}
      has_changes: ${{ steps.detect.outputs.has_changes }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          fetch-depth: 0  # Fetch full history to compare all pushed commits

      - name: Detect changed docker-compose files
        id: detect
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            # Manual trigger - use input
            APPS='["${{ github.event.inputs.app_name }}"]'
            echo "Manual deployment requested for: ${{ github.event.inputs.app_name }}"
          else
            # Push trigger - detect changed files
            echo "Detecting changed docker-compose and .env.enc files..."
            
            # Use github.event.before to compare ALL pushed commits, not just the last one
            # This handles batch pushes correctly (e.g., pushing 5 commits at once)
            BEFORE_SHA="${{ github.event.before }}"
            AFTER_SHA="${{ github.sha }}"
            
            echo "Comparing commits: $BEFORE_SHA...$AFTER_SHA"
            
            # Get list of changed files (docker-compose.yml, docker-compose.yaml, and .env.enc)
            CHANGED_FILES=$(git diff --name-only "$BEFORE_SHA" "$AFTER_SHA" -- 'docker/**/docker-compose.yml' 'docker/**/docker-compose.yaml' 'docker/**/.env.enc' || echo "")
            
            if [[ -z "$CHANGED_FILES" ]]; then
              echo "No deployment-related files changed"
              echo "has_changes=false" >> $GITHUB_OUTPUT
              echo "apps=[]" >> $GITHUB_OUTPUT
              exit 0
            fi
            
            echo "Changed files:"
            echo "$CHANGED_FILES"
            
            # Extract app names from paths (docker/<app-name>/...)
            APPS=$(echo "$CHANGED_FILES" | sed -n 's|docker/\([^/]*\)/.*|\1|p' | sort -u | jq -R -s -c 'split("\n") | map(select(length > 0))')
            
            echo "Apps to deploy: $APPS"
          fi
          
          echo "apps=$APPS" >> $GITHUB_OUTPUT
          echo "has_changes=true" >> $GITHUB_OUTPUT

  deploy:
    name: Deploy ${{ matrix.app }}
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true'
    runs-on: self-hosted
    
    strategy:
      matrix:
        app: ${{ fromJson(needs.detect-changes.outputs.apps) }}
      max-parallel: 1  # Deploy one at a time to avoid conflicts
      fail-fast: false  # Continue deploying other apps if one fails
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Validate app name
        run: |
          APP="${{ matrix.app }}"
          if [[ ! "$APP" =~ ^[a-zA-Z0-9_-]+$ ]]; then
            echo "::error::Invalid app name: $APP"
            exit 1
          fi
          echo "Deploying app: $APP"

      - name: Setup SSH
        uses: ./.github/actions/setup-ssh
        with:
          ssh-private-key: ${{ secrets.DEPLOYER_SSH_KEY }}
          ssh-known-hosts: ${{ secrets.DEPLOYER_SSH_KNOWN_HOSTS }}

      - name: Trigger deployment
        id: deploy
        run: |
          echo "::group::Triggering deployment on deployer.vm"
          
          # SSH to deployer.vm - the forced command will execute trigger-deploy.sh
          # We pass the app name as part of the SSH command
          ssh -i ~/.ssh/deploy_key \
              -o BatchMode=yes \
              -o ConnectTimeout=30 \
              -o StrictHostKeyChecking=yes \
              "${{ secrets.DEPLOYER_USER }}@${{ secrets.DEPLOYER_HOST }}" \
              "${{ matrix.app }}"
          
          DEPLOY_EXIT=$?
          
          echo "::endgroup::"
          
          if [[ $DEPLOY_EXIT -eq 0 ]]; then
            echo "✅ Deployment successful for ${{ matrix.app }}"
          else
            echo "::error::Deployment failed for ${{ matrix.app }}"
            exit $DEPLOY_EXIT
          fi

      - name: Cleanup SSH keys
        if: always()
        run: |
          rm -f ~/.ssh/deploy_key
          # Keep known_hosts for future runs

      - name: Send failure notification
        if: failure()
        uses: ./.github/actions/notify-telegram
        with:
          bot-token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          chat-id: ${{ secrets.TELEGRAM_CHAT_ID }}
          emoji: '❌'
          title: 'Deployment Failed'
          message: "App: <code>${{ matrix.app }}</code>%0ABranch: ${{ github.ref_name }}%0ACommit: ${{ github.sha }}%0ATriggered by: ${{ github.actor }}"
          run-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  notify:
    name: Send Notification
    needs: [detect-changes, deploy]
    if: always() && needs.detect-changes.outputs.has_changes == 'true' && needs.detect-changes.result == 'success'
    runs-on: self-hosted
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Determine notification parameters
        id: prep
        run: |
          DEPLOY_RESULT="${{ needs.deploy.result }}"
          
          if [[ "$DEPLOY_RESULT" == "success" ]]; then
            echo "emoji=✅" >> $GITHUB_OUTPUT
            echo "title=Deployment Successful" >> $GITHUB_OUTPUT
            echo "include_link=false" >> $GITHUB_OUTPUT
          else
            echo "emoji=❌" >> $GITHUB_OUTPUT
            echo "title=Deployment Failed" >> $GITHUB_OUTPUT
            echo "include_link=true" >> $GITHUB_OUTPUT
          fi

      - name: Send Telegram notification
        uses: ./.github/actions/notify-telegram
        with:
          bot-token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          chat-id: ${{ secrets.TELEGRAM_CHAT_ID }}
          emoji: ${{ steps.prep.outputs.emoji }}
          title: ${{ steps.prep.outputs.title }}
          message: "Apps: ${{ needs.detect-changes.outputs.apps }}%0ABranch: ${{ github.ref_name }}%0ACommit: ${{ github.sha }}%0ATriggered by: ${{ github.actor }}"
          run-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          include-run-link: ${{ steps.prep.outputs.include_link }}
