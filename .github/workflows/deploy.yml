# GitHub Actions Workflow: Deploy Docker Compose Applications
#
# This workflow triggers on changes to any docker-compose.yml file in the docker/ directory.
# It runs on a self-hosted runner and triggers deployment via SSH to the deployer VM.
#
# Security Model:
# - The runner only has SSH access to deployer.vm with a forced command
# - The runner cannot get a shell on deployer.vm
# - All deployment logic and credentials live on deployer.vm
#
# Required Secrets:
# - DEPLOYER_SSH_KEY: Private SSH key for github-runner -> deployer.vm
# - DEPLOYER_HOST: Hostname or IP of deployer.vm
# - DEPLOYER_USER: Username on deployer.vm
# - DEPLOYER_SSH_KNOWN_HOSTS: SSH known_hosts entry for deployer.vm
#
# Note: Telegram notifications are sent by the deployer VM scripts/Ansible,
# not by this workflow. Configure credentials in ~/.deploy-secrets on deployer.vm.
#

name: Deploy Docker Apps

permissions:
  contents: read

on:
  push:
    branches:
      - main
    paths:
      - 'docker/**'

  # Allow manual trigger with app name selection
  workflow_dispatch:
    inputs:
      app_name:
        description: 'Application to deploy (folder name in docker/)'
        required: true
        type: string

# Prevent concurrent deployments
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  detect-changes:
    name: Detect Changed Apps
    runs-on: self-hosted
    outputs:
      apps: ${{ steps.detect.outputs.apps }}
      has_changes: ${{ steps.detect.outputs.has_changes }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0  # Fetch full history to compare all pushed commits

      - name: Detect changed files
        id: detect
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_APP_NAME: ${{ github.event.inputs.app_name }}
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}
        run: |
          if [[ "${EVENT_NAME}" == "workflow_dispatch" ]]; then
            # Manual trigger - use input
            APPS=$(jq -n -c --arg app "$INPUT_APP_NAME" '[$app]')
            echo "Manual deployment requested for: ${INPUT_APP_NAME}"
          else
            # Push trigger - detect changed files
            echo "Detecting changed files..."

            # Use github.event.before to compare ALL pushed commits, not just the last one
            # This handles batch pushes correctly (e.g., pushing 5 commits at once)

            echo "Comparing commits: $BEFORE_SHA...$AFTER_SHA"

            # Get list of ALL changed files in docker/ directory
            CHANGED_FILES=$(git diff --name-only "$BEFORE_SHA" "$AFTER_SHA" -- \
              'docker/**' || echo "")

            if [[ -z "$CHANGED_FILES" ]]; then
              echo "No deployment-related files changed"
              echo "has_changes=false" >> $GITHUB_OUTPUT
              echo "apps=[]" >> $GITHUB_OUTPUT
              exit 0
            fi

            echo "Changed files:"
            echo "$CHANGED_FILES"

            # Extract app names from paths (docker/<app-name>/...)
            APPS=$(echo "$CHANGED_FILES" | sed -n 's|docker/\([^/]*\)/.*|\1|p' | sort -u | jq -R -s -c 'split("\n") | map(select(length > 0))')

            echo "Apps to deploy: $APPS"
          fi

          echo "apps=$APPS" >> $GITHUB_OUTPUT
          echo "has_changes=true" >> $GITHUB_OUTPUT

  deploy:
    name: Deploy ${{ matrix.app }}
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true'
    runs-on: self-hosted

    strategy:
      matrix:
        app: ${{ fromJson(needs.detect-changes.outputs.apps) }}
      max-parallel: 1  # Deploy one at a time to avoid conflicts
      fail-fast: false  # Continue deploying other apps if one fails

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Validate app name
        env:
          APP: ${{ matrix.app }}
        run: |
          if [[ ! "$APP" =~ ^[a-zA-Z0-9_-]+$ ]]; then
            echo "::error::Invalid app name: $APP"
            exit 1
          fi
          echo "Deploying app: $APP"

      - name: Setup SSH
        id: setup_ssh
        uses: ./.github/actions/setup-ssh
        with:
          ssh-private-key: ${{ secrets.DEPLOYER_SSH_KEY }}
          ssh-known-hosts: ${{ secrets.DEPLOYER_SSH_KNOWN_HOSTS }}

      - name: Trigger deployment
        id: deploy
        env:
          SSH_KEY_PATH: ${{ steps.setup_ssh.outputs['ssh-key-path'] }}
          DEPLOYER_USER: ${{ secrets.DEPLOYER_USER }}
          DEPLOYER_HOST: ${{ secrets.DEPLOYER_HOST }}
          APP: ${{ matrix.app }}
        run: |
          echo "::group::Triggering deployment on deployer.vm"

          # SSH to deployer.vm - the forced command will execute trigger-deploy.sh
          # We pass the app name as part of the SSH command
          # Notifications are handled by the deployer VM scripts
            ssh -i "${SSH_KEY_PATH}" \
              -o BatchMode=yes \
              -o ConnectTimeout=30 \
              -o StrictHostKeyChecking=yes \
              "${DEPLOYER_USER}@${DEPLOYER_HOST}" \
              "deploy ${APP}"

          DEPLOY_EXIT=$?

          echo "::endgroup::"

          if [[ $DEPLOY_EXIT -eq 0 ]]; then
            echo "✅ Deployment successful for ${APP}"
          else
            echo "::error::Deployment failed for ${APP}"
            exit $DEPLOY_EXIT
          fi

