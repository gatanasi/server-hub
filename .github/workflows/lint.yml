name: Linting

on:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: './deploy'

      - name: Ansible Lint
        uses: ansible/ansible-lint@main
        with:
          path: './ansible/playbooks'
