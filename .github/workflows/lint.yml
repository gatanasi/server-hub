name: Linting

on:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.1

      - name: ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: './deploy'

      - name: Ansible Lint
        uses: ansible/ansible-lint@v26.1.0
        with:
          working_directory: './ansible'
